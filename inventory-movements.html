<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>库存流水</title>
  <link rel="stylesheet" href="stock-adjustment.css">
  <link rel="stylesheet" href="stock-adjustment-admin-enhancements.css">
</head>
<body>
  <main class="shell admin-stock-page inventory-movements-page">
    <section class="page-card page-header-card">
      <div class="page-header">
        <div class="page-title-wrap">
          <h1>库存流水</h1>
          <p class="page-subtitle">展示库存变化记录，可按日期、业务员和变化类型筛选。</p>
        </div>
        <div class="page-actions">
          <button class="btn" onclick="location.href='dashboard'">返回管理看板</button>
          <button id="refresh" class="btn primary">刷新</button>
        </div>
      </div>
      <div class="filter-row movements-filter-row">
        <div class="range-row"><button id="range_all" class="range-btn active" onclick="setRange('all')">全部</button><div class="date-range-picker"><input id="customRangeText" class="date-input date-range-input" type="text" readonly placeholder="选择日期范围" onclick="openDateRangePicker()"><div id="dateRangePanel" class="date-range-panel hide"></div></div></div>
        <label class="filter-field">业务员 <select id="employee"><option value="">全部业务员</option></select></label>
        <label class="filter-field">变化类型 <select id="type"><option value="">全部库存变化类型</option><option value="manual_adjustment">人工库存调整</option></select></label>
        <button id="export" class="btn">导出 Excel</button>
        <input id="start" type="hidden">
        <input id="end" type="hidden">
      </div>
      <p id="status" class="status">正在加载库存流水...</p>
    </section>

    <section class="page-card">
      <div class="table-head">
        <h2>库存变化明细</h2>
        <span id="tableCount" class="table-count">0 条</span>
      </div>
      <div class="table-wrap movements-table-wrap">
        <table class="movements-table">
          <thead>
            <tr><th>工号</th><th>条码</th><th>规格口味</th><th>原因</th><th>数量</th><th>时间</th><th>类型</th><th>来源单号</th><th>前库存</th><th>后库存</th><th>操作人</th></tr>
          </thead>
          <tbody id="rows"><tr class="empty-row"><td colspan="11">正在加载...</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>const client=supabase.createClient('https://wyjbnnqhiehjccmojbbg.supabase.co','sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG');</script>
  <script src="stock-adjustment-core.js"></script>
  <script src="stock-adjustment-api.js"></script>
  <script src="inventory-movement-export.js"></script>
  <script src="inventory-movements-page.js"></script>
</body>
</html>
