<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>管理后台</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root{--primary:#4A154B;--primary2:#6A266C;--accent:#ffb81c;--bg:#f4f2f5;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--soft:#fbf9fc;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at 0 0,#eadfef 0,#f4f2f5 35%,#f4f2f5 100%);color:var(--text);padding:18px;-webkit-tap-highlight-color:transparent}.shell{max-width:1220px;margin:0 auto}.hero{position:relative;overflow:hidden;border-radius:28px;padding:26px 30px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 16px 36px rgba(74,21,75,.22);margin-bottom:14px}.hero:before,.hero:after{content:"";position:absolute;border:1px solid rgba(255,255,255,.16);border-radius:999px}.hero:before{width:390px;height:390px;right:-90px;top:-170px}.hero:after{width:240px;height:240px;right:85px;top:-75px}.hero-main{position:relative;z-index:1;display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap}h1{margin:0;font-size:34px;line-height:1.15}.hero-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;font-size:14px;line-height:1;min-height:40px}.btn:active{transform:scale(.98)}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.hero-btn{color:var(--primary);box-shadow:0 8px 20px rgba(0,0,0,.08)}.panel{background:#fff;border-radius:22px;padding:18px;border:1px solid rgba(231,225,232,.85);box-shadow:0 10px 24px rgba(74,21,75,.07);margin-bottom:14px}.quick-panel{padding:16px}.nav-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}.nav-card{border:1px solid var(--line);background:var(--soft);border-radius:18px;padding:14px;min-height:78px;cursor:pointer;text-align:left;display:flex;gap:12px;align-items:center;transition:.15s ease}.nav-card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(74,21,75,.09)}.nav-ico{width:42px;height:42px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}.nav-card strong{display:block;color:var(--text);font-size:15px}.nav-arrow{margin-left:auto;color:var(--primary);font-weight:950;font-size:20px}.filter-panel{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.range-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.range-btn{border:1px solid var(--line);background:#fff;color:var(--primary);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:900;cursor:pointer}.range-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}.date-input{height:38px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:0 12px;color:var(--primary);font-weight:800}.employee-filter{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.employee-chip{border:1px solid var(--line);background:#fff;color:var(--text);border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer}.employee-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}.status{font-size:13px;color:var(--muted);margin:4px 0 12px}.status.hide{display:none}.error{color:var(--danger);font-weight:800}.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:14px}.metric{background:#fff;border-radius:20px;padding:18px;border:1px solid rgba(231,225,232,.8);box-shadow:0 10px 24px rgba(74,21,75,.07);min-height:106px}.metric-top{display:flex;gap:12px;align-items:center}.metric-icon{width:44px;height:44px;border-radius:15px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px}.metric-label{font-size:12px;color:var(--muted);font-weight:800}.metric-value{margin-top:12px;color:var(--primary);font-size:30px;font-weight:950;line-height:1.08}.content-grid{display:grid;grid-template-columns:420px minmax(0,1fr);gap:14px}.panel-title{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.panel-title h2{margin:0;color:var(--primary);font-size:20px}.chart-wrap{height:220px;background:linear-gradient(180deg,#fff,#fbf9fc);border:1px solid var(--line);border-radius:18px;padding:10px;overflow:hidden}.empty{padding:28px;color:var(--muted);text-align:center;font-size:13px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}table{width:100%;min-width:650px;border-collapse:separate;border-spacing:0}th,td{border-bottom:1px solid var(--line);padding:11px 10px;vertical-align:middle;font-size:13px;white-space:normal;word-break:break-word}th{position:sticky;top:0;background:var(--primary);color:#fff;text-align:left;font-weight:900;z-index:2}tbody tr:nth-child(even){background:#fbf9fc}.rank{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;border-radius:999px;background:#f4f2f5;color:var(--primary);font-weight:950}.amount{font-weight:950;color:var(--primary)}.emp-code{margin-top:3px;color:var(--muted);font-size:12px}@media(max-width:1000px){.nav-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.content-grid{grid-template-columns:1fr}}@media(max-width:640px){body{padding:10px}.hero{padding:22px 18px;border-radius:22px}h1{font-size:28px}.hero-actions{width:100%}.metric-grid{grid-template-columns:1fr}.nav-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.filter-panel{display:block}.range-row{margin-bottom:10px}.range-btn,.date-input{flex:1 1 auto}.panel{padding:14px;border-radius:18px}.employee-filter{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.employee-chip{width:100%}}
</style>
</head>
<body>
<div class="shell">
<section class="hero"><div class="hero-main"><h1>管理后台</h1><div class="hero-actions"><button class="btn hero-btn" onclick="location.href='index'">员工开单入口</button><button class="btn hero-btn" onclick="loadDashboard()">刷新数据</button></div></div></section>
<section class="panel quick-panel"><div class="nav-grid"><button class="nav-card" onclick="location.href='store_import'"><span class="nav-ico">📍</span><strong>导入门店</strong><b class="nav-arrow">›</b></button><button class="nav-card" onclick="location.href='stock_jn'"><span class="nav-ico">📦</span><strong>吉能库存</strong><b class="nav-arrow">›</b></button><button class="nav-card" onclick="location.href='stock_ct'"><span class="nav-ico">🚚</span><strong>长涛库存</strong><b class="nav-arrow">›</b></button><button class="nav-card" onclick="location.href='stock_summary'"><span class="nav-ico">📊</span><strong>库存管理</strong><b class="nav-arrow">›</b></button><button class="nav-card" onclick="location.href='products'"><span class="nav-ico">🍪</span><strong>商品表</strong><b class="nav-arrow">›</b></button><button class="nav-card" onclick="location.href='employees'"><span class="nav-ico">👥</span><strong>员工表</strong><b class="nav-arrow">›</b></button></div></section>
<section class="panel filter-panel"><div class="range-row"><button id="range_today" class="range-btn active" onclick="setRange('today')">本日</button><button id="range_yesterday" class="range-btn" onclick="setRange('yesterday')">昨日</button><button id="range_7d" class="range-btn" onclick="setRange('7d')">近 7 天</button><button id="range_month" class="range-btn" onclick="setRange('month')">本月</button><button id="range_all" class="range-btn" onclick="setRange('all')">全部历史</button><input id="customDate" class="date-input" type="date" onchange="setRange('custom')"></div><div id="employeeFilter" class="employee-filter"></div></section>
<div id="status" class="status">正在加载看...</div><div class="metric-grid" id="metricGrid"></div>
<div class="content-grid"><section class="panel"><div class="panel-title"><h2>卖进趋势</h2></div><div class="chart-wrap" id="trendChart"></div></section><section class="panel"><div class="panel-title"><h2>卖进排行</h2><button class="btn primary" onclick="exportOrderExcel()">导出开单单据</button></div><div class="table-wrap"><table><thead><tr><th style="width:68px;">排名</th><th>员工</th><th style="width:130px;">卖进金额</th><th style="width:90px;">单据</th><th style="width:130px;">客单价</th><th style="width:120px;">最近开单</th></tr></thead><tbody id="employeeRankRows"></tbody></table></div></section></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>
const SUPABASE_URL="https://wyjbnnqhiehjccmojbbg.supabase.co";const SUPABASE_KEY=["sb","publishable","WwTC7079N2e8ZQwPKUj-Gw","ewFiviFG"].join("_");const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);let currentRange='today',selectedEmployeeCode='',dashboardOrders=[],dashboardEmployees=[],dashboardEmployeeMap=new Map();
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}function money(v){return Number(v||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}function formatDate(v){if(!v)return '-';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v).slice(0,10);return `${d.getMonth()+1}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}function formatDateOnly(v){if(!v)return '';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v).slice(0,10);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getStartDate(){const now=new Date();if(currentRange==='all')return null;if(currentRange==='custom'){const v=document.getElementById('customDate').value;return v?new Date(`${v}T00:00:00`):null;}if(currentRange==='yesterday'){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setDate(d.getDate()-1);return d;}if(currentRange==='7d'){const d=new Date(now);d.setDate(d.getDate()-6);d.setHours(0,0,0,0);return d;}if(currentRange==='month')return new Date(now.getFullYear(),now.getMonth(),1);return new Date(now.getFullYear(),now.getMonth(),now.getDate());}function getEndDate(){const now=new Date();if(currentRange==='custom'){const v=document.getElementById('customDate').value;return v?new Date(`${v}T23:59:59`):null;}if(currentRange==='yesterday'){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setSeconds(-1);return d;}return null;}
function setStatus(msg,cls=''){const el=document.getElementById('status');el.className='status '+cls;el.textContent=msg;}function hideStatus(){const el=document.getElementById('status');el.className='status hide';el.textContent='';}function setRange(range){currentRange=range;['today','yesterday','7d','month','all'].forEach(k=>{const b=document.getElementById('range_'+k);if(b)b.classList.toggle('active',k===range);});if(range!=='custom')document.getElementById('customDate').value='';loadDashboard();}function setEmployeeFilter(code){selectedEmployeeCode=String(code||'');renderDashboard();}function filterOrdersByEmployee(orders){return selectedEmployeeCode?orders.filter(o=>String(o.employee_code||'')===selectedEmployeeCode):orders;}function getFilteredOrders(){return filterOrdersByEmployee(dashboardOrders);}
function buildEmployeeOptions(orders,employees){const codes=new Set(orders.map(o=>String(o.employee_code||'')).filter(Boolean));return (employees||[]).filter(e=>codes.has(String(e.employee_code||''))).map(e=>({code:String(e.employee_code||''),name:e.name||e.employee_code||''})).sort((a,b)=>a.name.localeCompare(b.name,'zh-CN',{numeric:true}));}function renderEmployeeFilter(){const box=document.getElementById('employeeFilter');const opts=buildEmployeeOptions(dashboardOrders,dashboardEmployees);if(selectedEmployeeCode&&!opts.some(e=>e.code===selectedEmployeeCode))selectedEmployeeCode='';box.innerHTML=[`<button class="employee-chip ${selectedEmployeeCode?'':'active'}" onclick="setEmployeeFilter('')">全部员工</button>`,...opts.map(e=>`<button class="employee-chip ${selectedEmployeeCode===e.code?'active':''}" onclick="setEmployeeFilter('${esc(e.code)}')">${esc(e.name)}</button>`)].join('');}
function buildMetrics(orders){const total=orders.reduce((s,o)=>s+Number(o.total_amount||0),0);return{totalAmount:total,orderCount:orders.length,avgOrderAmount:orders.length?total/orders.length:0};}function renderMetrics(m){const cards=[['💵','卖进金额','¥ '+money(m.totalAmount)],['🧾','卖进单据',String(m.orderCount)],['📈','平均客单价',money(m.avgOrderAmount)]];document.getElementById('metricGrid').innerHTML=cards.map(c=>`<div class="metric"><div class="metric-top"><div class="metric-icon">${c[0]}</div><div class="metric-label">${c[1]}</div></div><div class="metric-value">${c[2]}</div></div>`).join('');}
function buildEmployeeRows(orders,employees){const emap=new Map((employees||[]).map(e=>[String(e.employee_code||''),e]));const g=new Map();orders.forEach(o=>{const code=String(o.employee_code||'');if(!code)return;if(!g.has(code))g.set(code,{employee_code:code,name:emap.get(code)?.name||'',totalAmount:0,orderCount:0,lastOrderAt:''});const r=g.get(code);r.totalAmount+=Number(o.total_amount||0);r.orderCount+=1;if(!r.lastOrderAt||String(o.created_at||'')>String(r.lastOrderAt))r.lastOrderAt=o.created_at||'';});return Array.from(g.values()).map(r=>({...r,avgOrderAmount:r.orderCount?r.totalAmount/r.orderCount:0})).sort((a,b)=>b.totalAmount-a.totalAmount||b.orderCount-a.orderCount||String(a.employee_code).localeCompare(String(b.employee_code),'zh-CN',{numeric:true}));}function renderEmployeeRank(rows){const tbody=document.getElementById('employeeRankRows');if(!rows.length){tbody.innerHTML='<tr><td colspan="6"><div class="empty">暂无卖进数据</div></td></tr>';return;}tbody.innerHTML=rows.map((r,i)=>`<tr><td><span class="rank">${i+1}</span></td><td><strong>${esc(r.name||r.employee_code)}</strong><div class="emp-code">${esc(r.employee_code)}</div></td><td class="amount">${money(r.totalAmount)}</td><td>${r.orderCount}</td><td>${money(r.avgOrderAmount)}</td><td>${esc(formatDate(r.lastOrderAt))}</td></tr>`).join('');}
function renderTrend(orders){const el=document.getElementById('trendChart');const g=new Map();orders.forEach(o=>{const day=formatDateOnly(o.created_at);if(day)g.set(day,(g.get(day)||0)+Number(o.total_amount||0));});const pts=Array.from(g.entries()).sort((a,b)=>a[0].localeCompare(b[0])).slice(-7);if(!pts.length){el.innerHTML='<div class="empty">暂无趋势数据</div>';return;}const max=Math.max(...pts.map(p=>p[1]),1),w=360,h=160,pad=18;const cs=pts.map((p,i)=>{const x=pad+(pts.length===1?(w-pad*2)/2:i*(w-pad*2)/(pts.length-1));const y=h-pad-(p[1]/max)*(h-pad*2);return{x,y,label:p[0].slice(5)}});el.innerHTML=`<svg viewBox="0 0 ${w} ${h}" width="100%" height="170" preserveAspectRatio="none"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#E7E1E8" stroke-width="2"/><polyline points="${cs.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="#4A154B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${cs.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#fff" stroke="#4A154B" stroke-width="3"/>`).join('')}</svg><div style="display:flex;justify-content:space-between;color:#756676;font-size:12px;font-weight:800;padding:0 6px;">${cs.map(p=>`<span>${p.label}</span>`).join('')}</div>`;}function renderDashboard(){const orders=getFilteredOrders();renderEmployeeFilter();renderMetrics(buildMetrics(orders));renderTrend(orders);renderEmployeeRank(buildEmployeeRows(orders,dashboardEmployees));hideStatus();}
function excelTextLen(v){return Array.from(String(v??'')).reduce((s,ch)=>s+(/[^\x00-\xff]/.test(ch)?2:1),0);}function buildExportColumnWidths(data){const min=[10,8,10,12,14,18,15,8,8],max=[14,14,14,18,46,58,20,10,10],ws=min.slice();data.forEach(r=>r.forEach((c,i)=>ws[i]=Math.max(ws[i]||8,Math.min(max[i]||30,excelTextLen(c)+2))));return ws.map(wch=>({wch}));}function applyExportStyles(ws,data,storeKeys){const range=XLSX.utils.decode_range(ws['!ref']);const border={top:{style:'thin',color:{rgb:'E7E1E8'}},bottom:{style:'thin',color:{rgb:'E7E1E8'}},left:{style:'thin',color:{rgb:'E7E1E8'}},right:{style:'thin',color:{rgb:'E7E1E8'}}};const head={fill:{patternType:'solid',fgColor:{rgb:'4A154B'}},font:{color:{rgb:'FFFFFF'},bold:true},alignment:{horizontal:'center',vertical:'center'},border};const white={fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}},alignment:{vertical:'center'},border};const gray={fill:{patternType:'solid',fgColor:{rgb:'F4F2F5'}},alignment:{vertical:'center'},border};for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r:0,c});if(ws[ref])ws[ref].s=head;}let last='',idx=-1;for(let r=1;r<data.length;r++){const key=storeKeys[r-1]||'';if(key!==last){idx++;last=key;}const st=idx%2===0?white:gray;for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r,c});if(!ws[ref])ws[ref]={t:'s',v:''};ws[ref].s=st;if(c===6)ws[ref].t='s';}}ws['!rows']=[{hpt:24},...Array(Math.max(0,data.length-1)).fill({hpt:22})];ws['!autofilter']={ref:ws['!ref']};ws['!freeze']={xSplit:0,ySplit:1};}
async function exportOrderExcel(){if(!window.XLSX){alert('Excel 导出组件加载失败，请刷新页面后重试');return;}const orders=getFilteredOrders();if(!orders.length){alert('当前筛选没有可导出的开单单据');return;}const orderNos=orders.map(o=>String(o.order_no||'')).filter(Boolean);if(!orderNos.length){alert('当前单据缺少订单号，无法导出明细');return;}const itemRes=await client.from('sales_order_items').select('order_no, barcode, product_name, unit_price, qty').in('order_no',orderNos);if(itemRes.error){console.error(itemRes.error);alert('开单明细加载失败：'+itemRes.error.message);return;}const items=itemRes.data||[];const barcodes=Array.from(new Set(items.map(i=>String(i.barcode||'')).filter(Boolean)));let productMap=new Map();if(barcodes.length){const productRes=await client.from('products').select('barcode, name').in('barcode',barcodes);if(productRes.error){console.error(productRes.error);alert('商品资料加载失败：'+productRes.error.message);return;}productMap=new Map((productRes.data||[]).map(p=>[String(p.barcode||''),p]));}const orderMap=new Map(orders.map(o=>[String(o.order_no||''),o]));const rows=[];items.forEach(item=>{const o=orderMap.get(String(item.order_no||''));if(!o)return;const code=String(o.employee_code||''),emp=dashboardEmployeeMap.get(code),bc=String(item.barcode||''),p=productMap.get(bc);rows.push({storeKey:`${String(o.atom_code||'')}|${o.store_name||''}`,values:[formatDateOnly(o.created_at),emp?.name||code,code,String(o.atom_code||''),o.store_name||'',p?.name||item.product_name||bc,bc,Number(item.unit_price||0),Number(item.qty||0)]});});rows.sort((a,b)=>a.storeKey.localeCompare(b.storeKey,'zh-CN',{numeric:true})||String(a.values[0]).localeCompare(String(b.values[0]))||String(a.values[5]).localeCompare(String(b.values[5]),'zh-CN',{numeric:true}));const data=[['开单日期','员工','员工号','门店编号','门店','商品名','条码','价格','散数'],...rows.map(r=>r.values)],storeKeys=rows.map(r=>r.storeKey);if(data.length===1){alert('当前筛选没有开单明细可导出');return;}const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=buildExportColumnWidths(data);applyExportStyles(ws,data,storeKeys);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'开单明细');XLSX.writeFile(wb,`开单明细_${new Date().toISOString().slice(0,10)}.xlsx`,{cellStyles:true});}
async function loadDashboard(){setStatus('正在加载...');const start=getStartDate(),end=getEndDate();let q=client.from('sales_orders').select('id, order_no, created_at, employee_code, atom_code, store_name, total_amount, status').order('created_at',{ascending:false}).limit(2000);if(start)q=q.gte('created_at',start.toISOString());if(end)q=q.lte('created_at',end.toISOString());const [ordersRes,employeesRes]=await Promise.all([q,client.from('employees').select('employee_code, name, is_active')]);if(ordersRes.error){console.error(ordersRes.error);setStatus('卖进数据加载失败：'+ordersRes.error.message,'error');return;}if(employeesRes.error){console.error(employeesRes.error);setStatus('员工数据加载失败：'+employeesRes.error.message,'error');return;}dashboardOrders=ordersRes.data||[];dashboardEmployees=employeesRes.data||[];dashboardEmployeeMap=new Map(dashboardEmployees.map(e=>[String(e.employee_code||''),e]));renderDashboard();}loadDashboard();
</script>
</body>
</html>
