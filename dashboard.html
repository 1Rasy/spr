function getInputValue(id){const el=document.getElementById(id);return el?el.value:'';}function dateOnlyValue(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}function rangeDisplayValue(start,end){if(!start&&!end)return '';if(start&&!end)return start;return start+' - '+(end||start);}function getCustomDateValues(){let start=customRangeStart,end=customRangeEnd||customRangeStart;if(start&&end&&end<start){const t=start;start=end;end=t;}return{start,end};}function normalizeCustomDateRange(){const v=getCustomDateValues();customRangeStart=v.start||'';customRangeEnd=v.end||'';updateDateRangeText();}function updateDateRangeText(){const el=document.getElementById('customRangeText');if(el)el.value=rangeDisplayValue(customRangeStart,customRangeEnd||customRangeStart);}function getStartDate(){const now=new Date();if(currentRange==='all')return null;if(currentRange==='custom'){const v=getCustomDateValues().start;return v?new Date(v+'T00:00:00'):null;}if(currentRange==='yesterday'){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setDate(d.getDate()-1);return d;}if(currentRange==='7d'){const d=new Date(now);d.setDate(d.getDate()-6);d.setHours(0,0,0,0);return d;}if(currentRange==='month')return new Date(now.getFullYear(),now.getMonth(),1);return new Date(now.getFullYear(),now.getMonth(),now.getDate());}function getEndDate(){const now=new Date();if(currentRange==='custom'){const v=getCustomDateValues().end;return v?new Date(v+'T23:59:59'):null;}if(currentRange==='yesterday'){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setSeconds(-1);return d;}return null;}function formatDateForFile(d){return (d.getMonth()+1)+'\u6708'+d.getDate()+'\u53f7';}function getExportDateLabel(){if(currentRange==='all')return '\u5168\u90e8\u5386\u53f2';const start=getStartDate();let end=getEndDate();if(!start)return '\u5168\u90e8\u5386\u53f2';if(!end){end=new Date();end.setHours(23,59,59,999);}const a=formatDateForFile(start),b=formatDateForFile(end);return a===b?a:a+'-'+b;}function getExportFileName(){return '\u5f00\u5355\u660e\u7ec6_'+getExportDateLabel()+'.xlsx';}function setRangeCalendarBase(d){rangeCalendarBase=new Date(d.getFullYear(),d.getMonth(),1);}function openDateRangePicker(){currentRange='custom';syncRangeButtons('custom');if(!rangeCalendarBase){const base=customRangeStart?new Date(customRangeStart+'T00:00:00'):new Date();setRangeCalendarBase(base);}renderDateRangePanel();const panel=document.getElementById('dateRangePanel');if(panel)panel.classList.remove('hide');}function closeDateRangePicker(){const panel=document.getElementById('dateRangePanel');if(panel)panel.classList.add('hide');}function shiftRangeMonth(delta){const base=rangeCalendarBase||new Date();setRangeCalendarBase(new Date(base.getFullYear(),base.getMonth()+delta,1));renderDateRangePanel();}function pickRangeDate(value){if(!customRangeStart||customRangeEnd){customRangeStart=value;customRangeEnd='';}else{customRangeEnd=value;normalizeCustomDateRange();closeDateRangePicker();loadDashboard();return;}updateDateRangeText();currentRange='custom';syncRangeButtons('custom');loadDashboard();renderDateRangePanel();}function renderMonth(base,offset){const first=new Date(base.getFullYear(),base.getMonth()+offset,1),year=first.getFullYear(),month=first.getMonth(),start=new Date(year,month,1-first.getDay()),selected=getCustomDateValues();let html='<div><div class="range-month-title">'+year+'-'+String(month+1).padStart(2,'0')+'</div><div class="range-week"><span>\u65e5</span><span>\u4e00</span><span>\u4e8c</span><span>\u4e09</span><span>\u56db</span><span>\u4e94</span><span>\u516d</span></div><div class="range-days">';for(let i=0;i<42;i++){const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i),val=dateOnlyValue(d),muted=d.getMonth()!==month,active=val===selected.start||val===selected.end,inRange=selected.start&&selected.end&&val>selected.start&&val<selected.end;html+='<button class="range-day '+(muted?'muted ':'')+(inRange?'in-range ':'')+(active?'active':'')+'" onclick="pickRangeDate(\''+val+'\')">'+d.getDate()+'</button>';}return html+'</div></div>';}function renderDateRangePanel(){const panel=document.getElementById('dateRangePanel');if(!panel)return;const base=rangeCalendarBase||new Date();setRangeCalendarBase(base);panel.innerHTML='<div class="range-cal-head"><button onclick="shiftRangeMonth(-1)">&lsaquo;</button><span>'+rangeDisplayValue(customRangeStart,customRangeEnd||customRangeStart)+'</span><button onclick="shiftRangeMonth(1)">&rsaquo;</button></div><div class="range-cal-grid">'+renderMonth(rangeCalendarBase,0)+renderMonth(rangeCalendarBase,1)+'</div><div class="range-picker-actions"><button onclick="customRangeStart=\'\';customRangeEnd=\'\';updateDateRangeText();renderDateRangePanel();">\u6e05\u7a7a</button><button onclick="closeDateRangePicker()">\u5173\u95ed</button></div>';}function setStatus(msg,cls=''){const el=document.getElementById('status');el.className='status '+cls;el.textContent=msg;}

function excelTextLen(v){return Array.from(String(v??'')).reduce((s,ch)=>s+(/[^\x00-\xff]/.test(ch)?2:1),0);}
function buildExportColumnWidths(data){const min=[10,8,10,12,14,18,15,8,8,8,8,10],max=[14,14,14,18,46,58,20,10,10,10,10,14],ws=min.slice();data.forEach(r=>r.forEach((c,i)=>ws[i]=Math.max(ws[i]||8,Math.min(max[i]||30,excelTextLen(c)+2))));return ws.map(wch=>({wch}));}
function applyExportStyles(ws,data,storeKeys){const range=XLSX.utils.decode_range(ws['!ref']);const border={top:{style:'thin',color:{rgb:'E7E1E8'}},bottom:{style:'thin',color:{rgb:'E7E1E8'}},left:{style:'thin',color:{rgb:'E7E1E8'}},right:{style:'thin',color:{rgb:'E7E1E8'}}};const head={fill:{patternType:'solid',fgColor:{rgb:'4A154B'}},font:{color:{rgb:'FFFFFF'},bold:true},alignment:{horizontal:'center',vertical:'center'},border};const white={fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}},alignment:{vertical:'center'},border};const gray={fill:{patternType:'solid',fgColor:{rgb:'F4F2F5'}},alignment:{vertical:'center'},border};for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r:0,c});if(ws[ref])ws[ref].s=head;}let last='',idx=-1;for(let r=1;r<data.length;r++){const key=storeKeys[r-1]||'';if(key!==last){idx++;last=key;}const st=idx%2===0?white:gray;for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r,c});if(!ws[ref])ws[ref]={t:'s',v:''};ws[ref].s=st;}}ws['!rows']=[{hpt:24},...Array(Math.max(0,data.length-1)).fill({hpt:22})];ws['!autofilter']={ref:ws['!ref']};}
function exportProductName(p,item){const spec=String(p?.spec||'').trim();const flavor=String(p?.flavor||'').trim();const name=(spec+flavor).trim();return name||p?.name||item.product_name||String(item.barcode||'');}
async function loadDashboardExportRows(){const start=getStartDate(),end=getEndDate(),res=await client.rpc('get_dashboard_export_order_items',{p_start_at:start?start.toISOString():null,p_end_at:end?end.toISOString():null,p_employee_code:selectedEmployeeCode||null});if(res.error)throw res.error;return Array.isArray(res.data)?res.data:[];}
async function exportOrderExcel(){if(!window.XLSX){alert('Excel 导出组件加载失败，请刷新页面后重试');return;}let sourceRows;try{sourceRows=await loadDashboardExportRows();}catch(error){console.error(error);alert('开单数据加载失败：'+error.message);return;}if(!sourceRows.length){alert('当前筛选没有可导出的开单明细');return;}const agg=new Map();sourceRows.forEach(item=>{const bc=String(item.barcode||''),saleUnit=String(item.sale_unit||'散'),saleQty=Number(item.sale_qty ?? item.qty ?? 0),salePrice=Number(item.sale_unit_price ?? item.unit_price ?? 0),amount=Number(item.amount||0),isMix=saleUnit==='拼盒',key=`${item.order_no}|${bc}|${saleUnit}`;if(!agg.has(key)){const code=String(item.employee_code||'');agg.set(key,{isMix,storeKey:`${String(item.atom_code||'')}|${item.store_name||''}`,date:formatDateOnly(item.created_at),empName:item.employee_name||code,empCode:code,atom:String(item.atom_code||''),store:item.store_name||'',product:exportProductName(item,item),barcode:bc,wholeQty:0,wholePrice:'',looseQty:0,loosePrice:'',amount:0});}const row=agg.get(key);if(isMix){const mixSize=Number(item.pcs_per_box||0)||1;row.looseQty+=saleQty;row.loosePrice=Number((salePrice/mixSize).toFixed(2));}else if(saleUnit==='整'){row.wholeQty+=saleQty;row.wholePrice=salePrice;}else{row.looseQty+=saleQty;row.loosePrice=salePrice;}row.amount+=amount;});const rows=Array.from(agg.values()).sort((a,b)=>a.storeKey.localeCompare(b.storeKey,'zh-CN',{numeric:true})||a.date.localeCompare(b.date)||a.product.localeCompare(b.product,'zh-CN',{numeric:true})||String(a.barcode).localeCompare(String(b.barcode),'zh-CN',{numeric:true}));if(!rows.length){alert('当前筛选没有开单明细可导出');return;}const headers=['开单日期','员工','员工号','门店编号','门店','商品名','条码','整数','整价','散数','散价','金额'];const toData=sheetRows=>[headers,...sheetRows.map(r=>[r.date,r.empName,r.empCode,r.atom,r.store,r.product,r.barcode,r.wholeQty||'',r.wholePrice===''?'':Number(r.wholePrice),r.looseQty||'',r.loosePrice===''?'':Number(r.loosePrice),Number(r.amount.toFixed(2))])];const normalRows=rows.filter(r=>!String(r.atom||'').startsWith('NEW_')),offlineRows=rows.filter(r=>String(r.atom||'').startsWith('NEW_'));const wb=XLSX.utils.book_new();const normalData=toData(normalRows);const normalKeys=normalRows.map(r=>r.storeKey);const ws=XLSX.utils.aoa_to_sheet(normalData);ws['!cols']=buildExportColumnWidths(normalData);applyExportStyles(ws,normalData,normalKeys);XLSX.utils.book_append_sheet(wb,ws,'开单明细');if(offlineRows.length){const offlineData=toData(offlineRows),offlineKeys=offlineRows.map(r=>r.storeKey),offlineWs=XLSX.utils.aoa_to_sheet(offlineData);offlineWs['!cols']=buildExportColumnWidths(offlineData);applyExportStyles(offlineWs,offlineData,offlineKeys);XLSX.utils.book_append_sheet(wb,offlineWs,'线外门店');}XLSX.writeFile(wb,getExportFileName(),{cellStyles:true});}
async function loadDashboard(){setStatus('正在加载...');const start=getStartDate(),end=getEndDate();let q=client.from('sales_orders').select('id, order_no, created_at, employee_code, atom_code, store_name, total_amount, status').order('created_at',{ascending:false}).limit(2000);if(start)q=q.gte('created_at',start.toISOString());if(end)q=q.lte('created_at',end.toISOString());const [ordersRes,employeesRes]=await Promise.all([q,client.from('employees').select('employee_code, name, is_active')]);if(ordersRes.error){console.error(ordersRes.error);setStatus('卖进数据加载失败：'+ordersRes.error.message,'error');return;}if(employeesRes.error){console.error(employeesRes.error);setStatus('员工数据加载失败：'+employeesRes.error.message,'error');return;}dashboardOrders=ordersRes.data||[];dashboardEmployees=employeesRes.data||[];dashboardEmployeeMap=new Map(dashboardEmployees.map(e=>[String(e.employee_code||''),e]));renderDashboard();}
loadDashboard();loadPendingStockAdjustmentBadge();
