function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function money(v){return Number(v||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function formatDate(v){if(!v)return '-';const d=new Date(v);if(Number.isNaN(d.getTime()))return String(v).slice(0,10);return `${d.getMonth()+1}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

function getStartDate(){const now=new Date();if(currentRange==='all')return null;if(currentRange==='custom'){const v=document.getElementById('customStart').value;return v?new Date(v+'T00:00:00'):null;}if(currentRange==='yesterday'){const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());d.setDate(d.getDate()-1);return d;}if(currentRange==='7d'){const d=new Date(now);d.setDate(d.getDate()-6);d.setHours(0,0,0,0);return d;}if(currentRange==='month')return new Date(now.getFullYear(),now.getMonth(),1);return new Date(now.getFullYear(),now.getMonth(),now.getDate());}

function setEmployeeFilter(code){selectedEmployeeCode=String(code||'');renderDashboard();}
function buildMetrics(orders){const total=orders.reduce((s,o)=>s+Number(o.total_amount||0),0);return{totalAmount:total,orderCount:orders.length,avgOrderAmount:orders.length?total/orders.length:0};}
function renderMetrics(m){const cards=[['💵','卖进金额','¥ '+money(m.totalAmount)],['🧾','卖进单据',String(m.orderCount)],['📈','平均客单价',money(m.avgOrderAmount)]];document.getElementById('metricGrid').innerHTML=cards.map(c=>`<div class="metric"><div style="display:flex;gap:12px;align-items:center"><div class="metric-icon">${c[0]}</div><div class="metric-label">${c[1]}</div></div><div class="metric-value">${c[2]}</div></div>`).join('');}
function buildEmployeeRows(orders,employees){const emap=new Map((employees||[]).map(e=>[String(e.employee_code||''),e]));const g=new Map();orders.forEach(o=>{const code=String(o.employee_code||'');if(!g.has(code))g.set(code,{code,name:emap.get(code)?.name||code,total:0,count:0,last:''});const r=g.get(code);r.total+=Number(o.total_amount||0);r.count++;if(!r.last||String(o.created_at)>String(r.last))r.last=o.created_at;});return Array.from(g.values()).sort((a,b)=>b.total-a.total);}

function renderTrendLine(rows,max){const w=720,h=260,padX=44,padY=24,innerW=w-padX*2,innerH=h-padY*2;const points=rows.map(([d,v],i)=>{const x=rows.length===1?w/2:padX+i*(innerW/(rows.length-1));const y=padY+innerH-(Number(v||0)/max)*innerH;return{x,y,d,v:Number(v||0)};});const path=points.map(p=>p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');const baseY=h-padY;const area=points.length>1?'<polygon points="'+padX+','+baseY+' '+path+' '+(w-padX)+','+baseY+'" fill="rgba(74,21,75,.055)"></polygon>':'';const dots=points.map(p=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="5" fill="#fff" stroke="var(--primary)" stroke-width="4" vector-effect="non-scaling-stroke"></circle>').join('');const labelStep=Math.max(1,Math.ceil(points.length/6));const labels=points.map((p,i)=>{const show=i===0||i===points.length-1||i%labelStep===0;return '<span>'+ (show?esc(String(p.d).slice(5)||p.d):'') +'</span>';}).join('');return '<div class="trend-figure" style="--trend-count:'+points.length+'"><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet" class="trend-line-svg" shape-rendering="geometricPrecision"><line x1="'+padX+'" y1="'+baseY+'" x2="'+(w-padX)+'" y2="'+baseY+'" stroke="#e7e1e8" stroke-width="2"></line>'+area+'<polyline points="'+path+'" fill="none" stroke="var(--primary)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"></polyline>'+dots+'</svg><div class="trend-axis">'+labels+'</div></div>';}
function renderTrend(orders){const box=document.getElementById('trendChart');const g=new Map();orders.forEach(o=>{const d=formatDateOnly(o.created_at);g.set(d,(g.get(d)||0)+Number(o.total_amount||0));});const rows=Array.from(g.entries()).sort((a,b)=>a[0].localeCompare(b[0]));if(!rows.length){box.innerHTML='<div class="empty">暂无趋势数据</div>';return;}const max=Math.max(...rows.map(r=>r[1]),1);box.innerHTML=renderTrendLine(rows,max);}

function applyExportStyles(ws,data,storeKeys){const range=XLSX.utils.decode_range(ws['!ref']);const border={top:{style:'thin',color:{rgb:'E7E1E8'}},bottom:{style:'thin',color:{rgb:'E7E1E8'}},left:{style:'thin',color:{rgb:'E7E1E8'}},right:{style:'thin',color:{rgb:'E7E1E8'}}};const head={fill:{patternType:'solid',fgColor:{rgb:'4A154B'}},font:{color:{rgb:'FFFFFF'},bold:true},alignment:{horizontal:'center',vertical:'center'},border};const white={fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}},alignment:{vertical:'center'},border};const gray={fill:{patternType:'solid',fgColor:{rgb:'F4F2F5'}},alignment:{vertical:'center'},border};for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r:0,c});if(ws[ref])ws[ref].s=head;}let last='',idx=-1;for(let r=1;r<data.length;r++){const key=storeKeys[r-1]||'';if(key!==last){idx++;last=key;}const st=idx%2===0?white:gray;for(let c=range.s.c;c<=range.e.c;c++){const ref=XLSX.utils.encode_cell({r,c});if(!ws[ref])ws[ref]={t:'s',v:''};ws[ref].s=st;}}ws['!rows']=[{hpt:24},...Array(Math.max(0,data.length-1)).fill({hpt:22})];ws['!autofilter']={ref:ws['!ref']};}
function exportProductName(p,item){const spec=String(p?.spec||'').trim();const flavor=String(p?.flavor||'').trim();const name=(spec+flavor).trim();return name||p?.name||item.product_name||String(item.barcode||'');}
async function exportOrderExcel(){if(!window.XLSX){alert('Excel 导出组件加载失败，请刷新页面后重试');return;}const orders=getFilteredOrders();if(!orders.length){alert('当前筛选没有可导出的开单单据');return;}const orderNos=orders.map(o=>String(o.order_no||'')).filter(Boolean);if(!orderNos.length){alert('当前单据缺少订单号，无法导出明细');return;}const itemRes=await client.from('sales_order_items').select('order_no, barcode, product_name, unit_price, qty, amount, sale_unit, sale_qty, sale_unit_price').in('order_no',orderNos);if(itemRes.error){console.error(itemRes.error);alert('开单明细加载失败：'+itemRes.error.message);return;}const items=itemRes.data||[];const barcodes=Array.from(new Set(items.map(i=>String(i.barcode||'')).filter(Boolean)));let productMap=new Map();if(barcodes.length){const productRes=await client.from('products').select('barcode, name, brand, spec, flavor, pcs_per_box').in('barcode',barcodes);if(productRes.error){console.error(productRes.error);alert('商品资料加载失败：'+productRes.error.message);return;}productMap=new Map((productRes.data||[]).map(p=>[String(p.barcode||''),p]));}const orderMap=new Map(orders.map(o=>[String(o.order_no||''),o]));const agg=new Map();items.forEach(item=>{const o=orderMap.get(String(item.order_no||''));if(!o)return;const bc=String(item.barcode||''),p=productMap.get(bc),saleUnit=String(item.sale_unit||'散'),saleQty=Number(item.sale_qty ?? item.qty ?? 0),salePrice=Number(item.sale_unit_price ?? item.unit_price ?? 0),amount=Number(item.amount||0),isMix=saleUnit==='拼盒',mixKey=isMix?`${o.order_no}|MIX|${p?.brand||''}|${p?.spec||''}`:'',key=mixKey||`${o.order_no}|${bc}`;if(!agg.has(key)){const code=String(o.employee_code||''),emp=dashboardEmployeeMap.get(code);agg.set(key,{isMix,spec:String(p?.spec||'').trim(),flavors:new Set(),storeKey:`${String(o.atom_code||'')}|${o.store_name||''}`,date:formatDateOnly(o.created_at),empName:emp?.name||code,empCode:code,atom:String(o.atom_code||''),store:o.store_name||'',product:isMix?'':exportProductName(p,item),barcode:isMix?'':bc,wholeQty:0,wholePrice:'',looseQty:0,loosePrice:'',amount:0});}const r=agg.get(key);if(isMix){const mixSize=Number(p?.pcs_per_box||0)||1;r.wholeQty+=saleQty/mixSize;r.wholePrice=salePrice;if(p?.flavor)r.flavors.add(String(p.flavor).trim());}else if(saleUnit==='整'){r.wholeQty+=saleQty;r.wholePrice=salePrice;}else{r.looseQty+=saleQty;r.loosePrice=salePrice;}r.amount+=amount;});const rows=Array.from(agg.values()).map(r=>{if(r.isMix){const flavorText=Array.from(r.flavors).filter(Boolean).join('/');r.product=(r.spec+flavorText).trim()||r.spec||'拼盒商品';}return r;}).sort((a,b)=>a.storeKey.localeCompare(b.storeKey,'zh-CN',{numeric:true})||a.date.localeCompare(b.date)||a.product.localeCompare(b.product,'zh-CN',{numeric:true}));if(!rows.length){alert('当前筛选没有开单明细可导出');return;}const headers=['开单日期','员工','员工号','门店编号','门店','商品名','条码','整数','整价','散数','散价','金额'];const toData=sheetRows=>[headers,...sheetRows.map(r=>[r.date,r.empName,r.empCode,r.atom,r.store,r.product,r.barcode,r.wholeQty||'',r.wholePrice===''?'':Number(r.wholePrice),r.looseQty||'',r.loosePrice===''?'':Number(r.loosePrice),Number(r.amount.toFixed(2))])];const normalRows=rows.filter(r=>!String(r.atom||'').startsWith('NEW_')),offlineRows=rows.filter(r=>String(r.atom||'').startsWith('NEW_'));const wb=XLSX.utils.book_new();const normalData=toData(normalRows);const normalKeys=normalRows.map(r=>r.storeKey);const ws=XLSX.utils.aoa_to_sheet(normalData);ws['!cols']=buildExportColumnWidths(normalData);applyExportStyles(ws,normalData,normalKeys);XLSX.utils.book_append_sheet(wb,ws,'开单明细');if(offlineRows.length){const offlineData=toData(offlineRows),offlineKeys=offlineRows.map(r=>r.storeKey),offlineWs=XLSX.utils.aoa_to_sheet(offlineData);offlineWs['!cols']=buildExportColumnWidths(offlineData);applyExportStyles(offlineWs,offlineData,offlineKeys);XLSX.utils.book_append_sheet(wb,offlineWs,'线外门店');}XLSX.writeFile(wb,getExportFileName(),{cellStyles:true});}
async function loadDashboard(){setStatus('正在加载...');const start=getStartDate(),end=getEndDate();let q=client.from('sales_orders').select('id, order_no, created_at, employee_code, atom_code, store_name, total_amount, status').order('created_at',{ascending:false}).limit(2000);if(start)q=q.gte('created_at',start.toISOString());if(end)q=q.lte('created_at',end.toISOString());const [ordersRes,employeesRes]=await Promise.all([q,client.from('employees').select('employee_code, name, is_active')]);if(ordersRes.error){console.error(ordersRes.error);setStatus('卖进数据加载失败：'+ordersRes.error.message,'error');return;}if(employeesRes.error){console.error(employeesRes.error);setStatus('员工数据加载失败：'+employeesRes.error.message,'error');return;}dashboardOrders=ordersRes.data||[];dashboardEmployees=employeesRes.data||[];dashboardEmployeeMap=new Map(dashboardEmployees.map(e=>[String(e.employee_code||''),e]));renderDashboard();}
loadDashboard();
