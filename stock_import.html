<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>库存导入</title>
<style>
:root{--primary:#4A154B;--bg:#f4f2f5;--card:#fff;--text:#1f1121;--muted:#756676;--line:#e7e1e8;--danger:#dc2626}*{box-sizing:border-box}body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.container{max-width:1120px;margin:0 auto}.back{display:inline-block;margin:0 0 12px;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;text-decoration:none}.page-title{margin:0 0 14px;color:var(--primary);font-size:26px}.import-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:var(--card);border:0;border-radius:14px;padding:16px;box-shadow:0 4px 14px rgba(74,21,75,.06)}h2{margin:0 0 10px;font-size:21px;color:var(--primary)}.map{border:1px solid var(--line);border-radius:10px;background:#fbf9fc;padding:12px;font-size:13px;line-height:1.6;color:var(--text);margin:0 0 12px}.upload-box{border:1px dashed var(--line);background:#fff;padding:45px 20px;border-radius:12px;cursor:pointer;text-align:center;position:relative;color:var(--muted)}.upload-box:hover,.upload-box.dragover{border-color:var(--primary);background:#fbf9fc}.file{position:absolute;inset:0;opacity:0;cursor:pointer}.info{margin-top:14px;padding:12px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:9px;font-size:14px;color:#2e7d32;display:none}.btn-submit{margin-top:14px;width:100%;background:var(--primary);color:#fff;border:1px solid var(--primary);padding:13px;border-radius:9px;font-size:15px;font-weight:700}.btn-submit:disabled{background:#ced4da;border-color:#ced4da}.status{margin-top:15px;font-size:13px;font-weight:700;color:var(--primary);text-align:center;white-space:pre-line}.error{color:var(--danger)}.hide{display:none!important}@media(max-width:700px){body{padding:12px}.import-grid{grid-template-columns:1fr}.page-title{font-size:23px}}
</style>
</head>
<body>
<main class="container">
  <a class="back" href="dashboard.html">← 返回管理后台</a>
  <h1 class="page-title">库存导入</h1>
  <div id="importGrid" class="import-grid"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY="sb"+"_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const SPECIAL={"6924513908032":1,"6924513908001":1,"6924513909244":1,"6924513909268":1,"6924513902283":1,"6924513908063":1};
const IMPORTERS=[
  {key:'jn',title:'导入吉能库存',fixedMap:'A单号、C制单日期、D客户编号、E客户、G条形码、H商品名称、I包装、J件、L散',prefix:'JN',hint:'A单号、D客户编号、G条形码',cols:{order_no:0,bill_date:2,customer_code:3,customer_name:4,barcode:6,product_name:7,package_reg:8,qty_piece:9,qty_scatter:11},required:[0,3,6]},
  {key:'ct',title:'导入长涛库存',fixedMap:'A制单日期、C商品名称、D包装、F件、G散、Q客户编号、R客户名称、X单号、AA条形码',prefix:'CT',hint:'X单号、Q客户编号、AA条形码',cols:{order_no:23,bill_date:0,customer_code:16,customer_name:17,barcode:26,product_name:2,package_reg:3,qty_piece:5,qty_scatter:6},required:[23,16,26]}
];
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function text(v){return v==null?'':String(v).trim()}
function num(v){const s=text(v).replace(/,/g,'');if(!s)return 0;const n=Number(s);return Number.isFinite(n)?n:0}
function keyNum(v){const n=Number(v);return Number.isFinite(n)?String(Math.round(n*1000000)/1000000):'0'}
function barcode(v){let s=text(v);if(!s)return'';if(/^[0-9]+(\.0+)?$/.test(s))return s.replace(/\.0+$/,'');const n=Number(s);if(Number.isFinite(n)&&/e\+?/i.test(s))return String(Math.trunc(n));return s}
function dateText(v){return text(v).replace(/\//g,'-').replace(/\s+/g,' ')}
function safe(v){return text(v).replace(/\s+/g,' ').replace(/[|]/g,'/')}
function bad(v){const s=text(v).toLowerCase();return !s||s==='undefined'||s==='null'}
function hash16(str){let h1=0x811c9dc5,h2=0x9e3779b9;for(let i=0;i<str.length;i++){const c=str.charCodeAt(i);h1=Math.imul(h1^c,16777619);h2=Math.imul(h2^(c+i),1597334677)}return 'i'+(h1>>>0).toString(16).padStart(8,'0')+(h2>>>0).toString(16).padStart(8,'0')}
function importUid(r){return hash16([safe(r.order_no),dateText(r.bill_date),safe(r.barcode),keyNum(r.qty_piece),keyNum(r.qty_scatter)].join('|'))}
function normRow(c,cfg){c=Array.isArray(c)?c:[];const first=text(c[0]);const miss=cfg.required.some(i=>c[i]===undefined);if(first.includes('\t')&&(c.length<=2||miss))return first.split('\t');return c}
function any(c,cfg){return normRow(c,cfg).some(x=>text(x)!=='')}
function header(c,cfg){const j=normRow(c,cfg).map(text).join('|').toLowerCase();return (j.includes('客户')||j.includes('customer'))&&(j.includes('条形码')||j.includes('barcode'))&&(j.includes('单号')||j.includes('order'))}
function dataRows(rows,cfg){const all=(rows||[]).map((cells,i)=>({cells:cells||[],sourceRowNo:i+1})).filter(r=>any(r.cells,cfg));return all.length&&header(all[0].cells,cfg)?all.slice(1):all}
async function whitelist(){const {data,error}=await client.from('dealer_employee_mappings').select('customer_code,employee_code').not('customer_code','is',null).not('employee_code','is',null);if(error)throw error;const set=new Set();(data||[]).forEach(r=>{const c=text(r.customer_code),e=text(r.employee_code);if(c&&e)set.add(c)});if(!set.size)throw new Error('dealer_employee_mappings 里没有可用的客户编号白名单');return set}
function makeRow(c,cfg,batch,rowNo){c=normRow(c,cfg);const r={import_batch_id:batch,is_processed:false,source_row_no:rowNo,order_no:text(c[cfg.cols.order_no]),bill_date:dateText(c[cfg.cols.bill_date]),customer_code:text(c[cfg.cols.customer_code]),customer_name:text(c[cfg.cols.customer_name]),barcode:barcode(c[cfg.cols.barcode]),product_name:text(c[cfg.cols.product_name]),package_reg:num(c[cfg.cols.package_reg]),qty_piece:num(c[cfg.cols.qty_piece]),qty_scatter:num(c[cfg.cols.qty_scatter])};r.is_triple_spec_direct=!!SPECIAL[r.barcode];r.import_uid=importUid(r);return r}
function build(rows,cfg,set){const batch=cfg.prefix+'_'+Date.now(),seen=new Set(),payload=[],invalid=[];let skipBad=0,skipMap=0,skipDup=0;const list=dataRows(rows,cfg);list.forEach(row=>{const r=makeRow(row.cells,cfg,batch,row.sourceRowNo);if(bad(r.order_no)||bad(r.barcode)||bad(r.customer_code)){skipBad++;if(invalid.length<5)invalid.push(`第${row.sourceRowNo}行：单号=${r.order_no||'空'}，客户编号=${r.customer_code||'空'}，条码=${r.barcode||'空'}`);return}if(!set.has(r.customer_code)){skipMap++;return}if(seen.has(r.import_uid)){skipDup++;return}seen.add(r.import_uid);payload.push(r)});return{payload,total:list.length,skipBad,skipMap,skipDup,invalid}}
async function upsertChunks(rows,setStatus){for(let i=0;i<rows.length;i+=500){const part=rows.slice(i,i+500);setStatus(`正在写入数据库 ${Math.min(i+part.length,rows.length)} / ${rows.length} 条...`);const {error}=await client.from('raw_dealer_outbounds').upsert(part,{onConflict:'import_uid'});if(error)throw error;await new Promise(resolve=>setTimeout(resolve,0))}}
function renderImporter(cfg){return `<section class="card" data-importer="${cfg.key}"><h2>${cfg.title}</h2><div class="map"><strong>固定列：</strong>${cfg.fixedMap}</div><div class="upload-box"><div style="font-size:13px;">点击选择文件，或拖拽 Excel 到这里</div><input class="file" type="file" accept=".xlsx,.xls"></div><div class="info">已选择文件：<span class="file-name"></span></div><button class="btn-submit" disabled>确认导入数据库</button><div class="status hide"></div></section>`}
function mountImporter(root,cfg){const dropZone=root.querySelector('.upload-box'),fileInput=root.querySelector('.file'),info=root.querySelector('.info'),fileName=root.querySelector('.file-name'),button=root.querySelector('.btn-submit'),message=root.querySelector('.status');let selectedFile=null;const setStatus=(value,isError=false)=>{message.classList.remove('hide');message.classList.toggle('error',isError);message.innerText=value};const pick=file=>{const ext=file.name.split('.').pop().toLowerCase();if(ext!=='xlsx'&&ext!=='xls'){alert('文件格式错误，请选择 .xlsx 或 .xls');return}selectedFile=file;fileName.innerText=file.name;info.style.display='block';button.disabled=false;message.classList.add('hide');message.classList.remove('error')};['dragenter','dragover','dragleave','drop'].forEach(type=>dropZone.addEventListener(type,event=>{event.preventDefault();event.stopPropagation()}));['dragenter','dragover'].forEach(type=>dropZone.addEventListener(type,()=>dropZone.classList.add('dragover')));['dragleave','drop'].forEach(type=>dropZone.addEventListener(type,()=>dropZone.classList.remove('dragover')));dropZone.addEventListener('drop',event=>{if(event.dataTransfer.files.length)pick(event.dataTransfer.files[0])});fileInput.addEventListener('change',event=>{if(event.target.files.length)pick(event.target.files[0])});button.addEventListener('click',()=>{if(!selectedFile)return;button.disabled=true;setStatus('正在解析 Excel 数据...');const reader=new FileReader();reader.onload=async event=>{try{setStatus('正在读取客户编号白名单...');const set=await whitelist();const workbook=XLSX.read(new Uint8Array(event.target.result),{type:'array',cellDates:true}),sheet=workbook.Sheets[workbook.SheetNames[0]],rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,dateNF:'yyyy-mm-dd hh:mm:ss',blankrows:false});if(!rows||!rows.length)throw new Error('Excel 未包含任何可读取内容');const result=build(rows,cfg,set);if(!result.payload.length){const sample=result.invalid.length?'\n\n无效行示例：\n'+result.invalid.join('\n'):'';throw new Error(`有效行解析为0。原始数据 ${result.total} 行，未匹配白名单 ${result.skipMap} 行，无效行 ${result.skipBad} 行。请检查 ${cfg.hint} 是否在固定列。${sample}`)}setStatus(`原始数据 ${result.total} 行\n白名单命中 ${result.payload.length} 行\n跳过未匹配客户 ${result.skipMap} 行\n跳过无效行 ${result.skipBad} 行\n跳过本文件内重复 ${result.skipDup} 行\n正在写入...`);await upsertChunks(result.payload,setStatus);setStatus(`数据导入完成。\n原始数据 ${result.total} 行，实际导入/更新 ${result.payload.length} 行。`);alert('导入成功，共处理 '+result.payload.length+' 条记录');info.style.display='none';fileInput.value='';selectedFile=null}catch(error){console.error(error);setStatus('导入失败：'+(error.message||error),true);alert('导入失败：'+(error.message||error))}finally{button.disabled=false}};reader.readAsArrayBuffer(selectedFile)})}
const grid=document.getElementById('importGrid');grid.innerHTML=IMPORTERS.map(renderImporter).join('');IMPORTERS.forEach(cfg=>mountImporter(grid.querySelector(`[data-importer="${cfg.key}"]`),cfg));
</script>
</body>
</html>
