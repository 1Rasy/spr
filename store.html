const SUPABASE_URL='https://wyjbnnqhiehjccmojbbg.supabase.co';const SUPABASE_KEY='sb'+'_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG';const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);const urlParams=new URLSearchParams(location.search),urlEmpCode=(urlParams.get('emp')||urlParams.get('employee_code')||'').trim(),urlEmpName=(urlParams.get('name')||'').trim();const currentEmployee={code:urlEmpCode||sessionStorage.getItem('current_employee_code'),name:urlEmpName||sessionStorage.getItem('current_employee_name')||''};if(urlEmpCode){sessionStorage.setItem('current_employee_code',urlEmpCode);if(urlEmpName)sessionStorage.setItem('current_employee_name',urlEmpName)}if(!currentEmployee.code){alert('当前无登录员工，请重新选择员工！');location.href='index.html'}if(!currentEmployee.name)currentEmployee.name=currentEmployee.code;if(currentEmployee.code&&!urlEmpCode){const u=new URL(location.href);u.searchParams.set('emp',currentEmployee.code);history.replaceState(null,'',u.pathname+'?'+u.searchParams.toString()+u.hash)}
let STATE='STORE',stores=[],products=[],currentStore=null,orderData=null,currentSelectedBrand=null,currentSelectedSpec='ALL',historyOrders=[],stockData={},selectedReportDate='today',isNewStoreFlow=false;const LOADING_TEXT='正在加载..';
function loadingHtml(){return `<div style="color:#756676;padding:10px;">${LOADING_TEXT}</div>`}function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function money(v){return Number(v||0).toFixed(2)}function unitOf(p){return p?.unit||'个'}function isThreeLevelProduct(p){return Number(p?.pcs_per_box||0)>0}function packSize(p){return isThreeLevelProduct(p)?Number(p.pcs_per_box||1):Number(p.pcs_per_case||1)}function wholeDefaultPrice(p){return Number((Number(p.default_price||0)*packSize(p)).toFixed(2))}function defaultItem(p){return{wholeQty:0,looseQty:0,wholePrice:wholeDefaultPrice(p),loosePrice:Number(p.default_price||0)}}function stockQtyFromItem(p,it){return Number(it?.wholeQty||0)*packSize(p)+Number(it?.looseQty||0)}function amountFromItem(it){return Number(it?.wholeQty||0)*Number(it?.wholePrice||0)+Number(it?.looseQty||0)*Number(it?.loosePrice||0)}function productSortValue(p){const s=Number(p.sort_order);if(Number.isFinite(s)&&s>0)return s;const i=Number(p.db_id||p.raw_id||0);return Number.isFinite(i)&&i>0?i*10:999999}function compareProducts(a,b){const d=productSortValue(a)-productSortValue(b);if(d!==0)return d;return String(a.name||a.product_name||a.id).localeCompare(String(b.name||b.product_name||b.id),'zh-CN',{numeric:true})}function orderedProducts(list=products){return [...list].sort(compareProducts)}function orderedUnique(list,field){const seen=new Set(),out=[];orderedProducts(list).forEach(p=>{const v=(p[field]||'').trim?.()??p[field];if(v&&!seen.has(v)){seen.add(v);out.push(v)}});return out}
function dateOnly(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function getReportRange(preset){const now=new Date();let s=new Date(now),e=new Date(now);if(preset==='yesterday'){s.setDate(s.getDate()-1);e=new Date(s)}else if(preset==='week'){const day=(now.getDay()+6)%7;s.setDate(now.getDate()-day)}else if(preset==='month'){s=new Date(now.getFullYear(),now.getMonth(),1)}else if(preset==='all'){return{label:'全部',start:'',end:''}}else preset='today';const labels={today:'今天',yesterday:'昨天',week:'本周',month:'本月'};return{label:labels[preset]||'今天',start:dateOnly(s),end:dateOnly(e)}}function reportFilterHtml(active){return `<div id="reportFilters" style="display:flex;gap:8px;margin:8px 0 14px;overflow-x:auto;padding-bottom:2px;">${[['today','今天'],['yesterday','昨天'],['week','本周'],['month','本月'],['all','全部']].map(([v,t])=>`<button class="smallbtn" style="white-space:nowrap;${active===v?'background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700;':''}" onclick="openSaleReport('${v}')">${t}</button>`).join('')}</div>`}function renderReportLoading(preset){const summary=`<div id="reportSummary" class="amount-summary-banner"><span style="color:var(--text-muted);">${LOADING_TEXT}</span></div>`,rows=`<div id="reportRows"><div class="sub" style="text-align:center;padding:28px;color:#aaa;">${LOADING_TEXT}</div></div>`,filters=reportFilterHtml(preset);if(STATE==='REPORT'&&document.getElementById('reportSummary')){document.getElementById('reportFilters').outerHTML=filters;document.getElementById('reportSummary').outerHTML=summary;document.getElementById('reportRows').outerHTML=rows;return}document.getElementById('list').innerHTML=`<div class="big-store-title">📈 卖进数据</div>${filters}${summary}${rows}`}
function splitQtyForEditor(total,p){const q=Number(total)||0,size=packSize(p);return{wholeQty:Math.floor(q/size),looseQty:q%size}}function formatStockQty(total,p){const q=Number(total)||0,whole=Math.floor(Math.abs(q)/packSize(p)),loose=Math.abs(q)%packSize(p),sign=q<0?'-':'';return `${sign}${whole}整 ${loose}${unitOf(p)}`}
async function resolveCurrentEmployeeName(){try{if(currentEmployee.name&&currentEmployee.name!==currentEmployee.code)return;const{data}=await client.from('employees').select('name').eq('employee_code',currentEmployee.code).maybeSingle();if(data?.name){currentEmployee.name=data.name;sessionStorage.setItem('current_employee_name',data.name)}}catch(e){console.warn(e)}}async function init(){try{document.getElementById('list').innerHTML=loadingHtml();await resolveCurrentEmployeeName();const p=await client.from('products').select('*').eq('is_active',true).order('sort_order',{ascending:true}).order('id',{ascending:true});products=(p.data||[]).map(x=>({...x,raw_id:x.id,db_id:x.id,id:String(x.barcode),product_name:x.flavor||x.name||x.barcode,spec:(x.spec||'常规').trim(),brand:(x.brand||'未分类').trim(),unit:(x.unit||'个').trim(),pcs_per_box:parseInt(x.pcs_per_box)||0,pcs_per_case:parseInt(x.pcs_per_case)||24,sort_order:Number(x.sort_order||0)})).sort(compareProducts);await loadStoresForCurrentEmployee()}catch(err){console.error(err);document.getElementById('list').innerHTML='<div style="color:red;padding:10px;">❌ 页面初始化失败，请重试</div>'}}async function loadStoresForCurrentEmployee(){const{data,error}=await client.from('employee_store_assets').select('atom_code, store_name').eq('employee_code',currentEmployee.code);if(error){document.getElementById('list').innerHTML=`<div class="sub" style="color:red;padding:20px;">❌ 门店加载失败: ${error.message}</div>`;return}stores=(data||[]).map(x=>({atom_code:String(x.atom_code).trim(),store_name:(x.store_name||'未命名门店').trim()})).sort((a,b)=>a.store_name.localeCompare(b.store_name,'zh-CN'));renderStores()}
function handleSearch(){const val=document.getElementById('search').value;document.getElementById('clearSearch').style.display=val?'block':'none';if(STATE==='STORE'){if(val)enterStoreSearchMode();else exitStoreSearchMode();renderStores()}}function clearSearchInput(){document.getElementById('search').value='';document.getElementById('clearSearch').style.display='none';exitStoreSearchMode();if(STATE==='STORE')renderStores()}function getSearch(){return document.getElementById('search').value||''}function closeKeyboardOnStoreScroll(){const search=document.getElementById('search');if(STATE==='STORE'&&search?.value&&document.activeElement===search)search.blur()}function syncStoreViewportHeight(){const h=window.visualViewport?window.visualViewport.height:window.innerHeight;document.documentElement.style.setProperty('--vvh',Math.floor(h)+'px')}function enterStoreSearchMode(){syncStoreViewportHeight();document.body.classList.add('store-search-mode');setTimeout(()=>document.getElementById('search')?.scrollIntoView({block:'start',behavior:'smooth'}),60)}function exitStoreSearchMode(){document.body.classList.remove('store-search-mode')}window.visualViewport?.addEventListener('resize',syncStoreViewportHeight);window.visualViewport?.addEventListener('scroll',syncStoreViewportHeight);window.addEventListener('resize',syncStoreViewportHeight);window.addEventListener('DOMContentLoaded',()=>{const search=document.getElementById('search'),list=document.getElementById('list');search?.addEventListener('focus',()=>{if(STATE==='STORE')enterStoreSearchMode()});search?.addEventListener('blur',()=>setTimeout(()=>{if(!search.value)exitStoreSearchMode()},150));list?.addEventListener('touchmove',closeKeyboardOnStoreScroll,{passive:true});list?.addEventListener('scroll',closeKeyboardOnStoreScroll,{passive:true});syncStoreViewportHeight()});
function getStoreFirstLetter(name){if(!name)return'#';try{const py=pinyinPro.pinyin(name.trim().charAt(0),{pattern:'first',toneType:'none'}),l=(py||'').charAt(0).toUpperCase();return /[A-Z]/.test(l)?l:'#'}catch(e){return'#'}}function storeItemHtml(s){const isTemp=String(s.atom_code).startsWith('NEW_');return `<div class='item' onclick="openStoreHistory('${esc(s.atom_code)}','${esc(s.store_name)}')"><strong style="font-size:16px;color:var(--primary);">${esc(s.store_name)} ${isTemp?'<span style="font-size:11px;background:#fff1f0;color:#ff4d4f;padding:2px 6px;border-radius:12px;">新门店</span>':''}</strong><div class='sub'>${esc(s.atom_code)}</div></div>`}function renderStores(){STATE='STORE';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.remove('hide');document.getElementById('search').placeholder='🔍 输入门店名称或编码搜索店铺...';const k=getSearch().trim(),f=stores.filter(s=>(s.store_name||'').includes(k)||(s.atom_code||'').includes(k)),sidebar=document.getElementById('alphabetSidebar');let html=`<div class="store-top-gates"><button class="btn-gate-half btn-gate-stock" onclick="openStockManagement()">📦 库存管理</button><button class="btn-gate-half btn-gate-report" onclick="openSaleReport('today')">📊 卖进数据</button><button class="btn-gate-half btn-gate-newstore" onclick="openNewStoreManagement()">🆕 新门店</button></div><div class="store-search-summary" style='font-size:13px;font-weight:700;color:var(--text-muted);margin:0 0 14px 4px;'>门店总数：${stores.length} 家</div>`;if(k){sidebar.classList.add('hide');sidebar.innerHTML='';document.getElementById('list').innerHTML=html+`<div class="store-container">${f.length?f.map(storeItemHtml).join(''):`<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`}</div>`;return}const grouped={},letters=new Set();f.forEach(s=>{const l=getStoreFirstLetter(s.store_name);(grouped[l]||(grouped[l]=[])).push(s);letters.add(l)});const sorted=Array.from(letters).sort();if(sorted.length>1&&f.length>10){sidebar.classList.remove('hide');sidebar.innerHTML=sorted.map(l=>`<div style="font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;margin:3px 0;" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('')}else{sidebar.classList.add('hide');sidebar.innerHTML=''}html+='<div class="store-container">';if(!sorted.length)html+=`<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;else sorted.forEach(l=>{html+=`<div id="group_letter_${l}" class="letter-group-title">${l}</div>`;grouped[l].forEach(s=>html+=storeItemHtml(s))});document.getElementById('list').innerHTML=html+'</div>'}function scrollToLetterGroup(letter){document.getElementById(`group_letter_${letter}`)?.scrollIntoView({behavior:'smooth',block:'start'})}
function openNewStoreManagement(){STATE='NEW_STORE_MGT';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');const newStores=stores.filter(s=>String(s.atom_code).startsWith('NEW_'));document.getElementById('list').innerHTML=`<div class="big-store-title">🆕 新门店开单管理</div><button class="btn-new-order" style="background:linear-gradient(135deg,#ff9c6e,#ff4d4f);" onclick="triggerCreateNewStore()">＋ 创建新门店并开单</button><div style='font-size:14px;font-weight:800;color:var(--primary);margin:18px 0 8px 4px;'>已开单的新门店列表 (${newStores.length})</div>${newStores.length===0?`<div class="sub" style="text-align:center;padding:40px;color:#aaa;background:#faf9fa;border-radius:8px;border:1px dashed #e2dde3;">暂无自主创建的新门店信息</div>`:newStores.map(s=>`<div class="history-item" style="border-left:4px solid #ff7875;"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><div><strong style="font-size:16px;color:var(--primary);">${esc(s.store_name)}</strong><div class="sub" style="font-size:12px;">临时编码: ${esc(s.atom_code)}</div></div><button class="smallbtn" style="background:var(--primary);color:#fff;border:none;padding:6px 12px;" onclick="openStoreHistory('${esc(s.atom_code)}','${esc(s.store_name)}')">去开单 / 历史 →</button></div></div>`).join('')}`}function triggerCreateNewStore(){const storeName=prompt('请输入自定义新门店的名称:');if(!storeName?.trim()){if(storeName!==null)alert('门店名称不能为空！');return}const tempAtomCode=`NEW_${Math.random().toString(36).substring(2,8).toUpperCase()}`;isNewStoreFlow=true;currentStore={atom:tempAtomCode,name:storeName.trim()};templateEditOrNew(null,null,null,tempAtomCode,storeName.trim())}
function getFirstBrand(){return orderedUnique(products,'brand')[0]||null}function getSpecsForBrand(brand){return orderedUnique(products.filter(p=>p.brand===brand),'spec')}function generateFilterHeaderHtml(){const brands=orderedUnique(products,'brand');if(!currentSelectedBrand&&brands.length)currentSelectedBrand=brands[0];const specs=getSpecsForBrand(currentSelectedBrand);if(!specs.includes(currentSelectedSpec)&&specs.length)currentSelectedSpec=specs[0];return `<div class='brand-nav'>${brands.map(b=>`<div class="brand-badge ${b===currentSelectedBrand?'active':''}" onclick="selectBrand('${esc(b)}')">${esc(b)}</div>`).join('')}</div><div class='spec-nav'>${specs.map(sp=>`<div class="spec-badge ${currentSelectedSpec===sp?'active':''}" onclick="selectSpec('${esc(sp)}')">${esc(sp)}</div>`).join('')}</div>`}function selectBrand(brand){currentSelectedBrand=brand;const specs=getSpecsForBrand(brand);currentSelectedSpec=specs[0]||'';STATE==='ORDER'?renderOrder():STATE==='STOCK'&&renderStockPage()}function selectSpec(spec){currentSelectedSpec=spec;STATE==='ORDER'?renderOrder():STATE==='STOCK'&&renderStockPage()}function makeQtyOptions(max,current){let html='';for(let i=0;i<=max;i++)html+=`<option value="${i}" ${i===Number(current)?'selected':''}>${i}</option>`;return html}
async function openStockManagement(){STATE='STOCK';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');document.getElementById('list').innerHTML=loadingHtml();const{data}=await client.from('van_stocks').select('product_barcode, qty').eq('employee_code',currentEmployee.code);const map={};(data||[]).forEach(st=>map[st.product_barcode]=Number(st.qty)||0);stockData={currentStockMap:map};if(!currentSelectedBrand)currentSelectedBrand=getFirstBrand();currentSelectedSpec=getSpecsForBrand(currentSelectedBrand)[0]||'';renderStockPage()}function renderStockPage(){STATE='STOCK';const list=orderedProducts(products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec));document.getElementById('list').innerHTML=`<div class='sub' style='font-weight:700;color:var(--primary);font-size:15px;'>🏢 库存查看：${esc(currentEmployee.name)}</div>${generateFilterHeaderHtml()}${list.map(p=>{const total=stockData.currentStockMap[p.id]||0;return `<div class="stock-row"><div style="font-weight:600;font-size:15px;">${esc(p.product_name)}</div><div class="stock-qty">当前库存量: <strong>${formatStockQty(total,p)}</strong> (${total}${unitOf(p)})</div></div>`}).join('')}`}
async function openStoreHistory(atom,name){exitStoreSearchMode();STATE='HISTORY';currentStore={atom,name};document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');document.getElementById('list').innerHTML=loadingHtml();const{data:ordersData}=await client.from('sales_orders').select('*').eq('atom_code',atom).order('created_at',{ascending:false});historyOrders=ordersData||[];if(historyOrders.length){const nos=historyOrders.map(o=>o.order_no);const{data:itemsData}=await client.from('sales_order_items').select('*').in('order_no',nos);const all=itemsData||[];historyOrders.forEach(o=>{const oi=all.filter(it=>it.order_no===o.order_no);o.skuCount=new Set(oi.map(it=>it.barcode)).size;o.saleSum=oi.reduce((s,it)=>s+Number(it.amount||0),0)})}renderHistory()}function renderHistory(){STATE='HISTORY';const isTemp=String(currentStore.atom).startsWith('NEW_');document.getElementById('list').innerHTML=`<div class="big-store-title">${esc(currentStore.name)} ${isTemp?'<span style="font-size:12px;background:#fff1f0;color:#ff4d4f;padding:2px 8px;border-radius:12px;vertical-align:middle;">新门店</span>':''}</div><div style="margin:14px 0;"><button class="btn-new-order" onclick="openOrder('${esc(currentStore.atom)}','${esc(currentStore.name)}')">＋ 新增单据</button></div>${historyOrders.map(o=>{const d=o.created_at?o.created_at.split('T')[0]:'未知日期';return `<div class="history-item" onclick="viewOrderDetail('${esc(o.order_no)}','${d}',false)"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><span style="color:var(--primary);font-size:14px;font-weight:bold;">💵 实收：${money(o.saleSum||0)} 元</span><span style="color:var(--primary);font-size:14px;">详情 →</span></div><div style="font-size:13px;color:var(--text-muted);line-height:1.45;margin-top:4px;">品项数: ${o.skuCount||0} 款 | 日期: ${d}</div></div>`}).join('')}`}
function aggregateDetailItems(items){const m=new Map();items.forEach(it=>{const bc=String(it.barcode||''),p=products.find(x=>x.id===bc)||{id:bc,product_name:it.product_name||bc,unit:'个',pcs_per_case:1,pcs_per_box:0};if(!m.has(bc))m.set(bc,{barcode:bc,product:p,product_name:it.product_name||p.product_name||bc,wholeQty:0,wholePrice:0,looseQty:0,loosePrice:0,amount:0,stockQty:0});const r=m.get(bc),su=String(it.sale_unit||'散'),sq=Number(it.sale_qty??it.qty??0),sp=Number(it.sale_unit_price??it.unit_price??0);if(su==='整'){r.wholeQty+=sq;r.wholePrice=sp}else{r.looseQty+=sq;r.loosePrice=sp}r.amount+=Number(it.amount||0);r.stockQty+=Number(it.qty||0)});return Array.from(m.values())}
async function viewOrderDetail(orderNo,orderDate,fromReport=false){STATE='DETAIL';document.getElementById('list').setAttribute('data-from-report',fromReport?'true':'false');document.getElementById('list').innerHTML=loadingHtml();const{data}=await client.from('sales_order_items').select('*').eq('order_no',orderNo);const items=data||[],rows=aggregateDetailItems(items),raw=encodeURIComponent(JSON.stringify(items)),sum=rows.reduce((s,r)=>s+r.amount,0);document.getElementById('list').innerHTML=`<div class="big-store-title">${currentStore?esc(currentStore.name):'客户账单'}</div><div class="amount-summary-banner"><span style="font-size:16px;color:var(--primary);">💵 <strong>账单实收：${money(sum)} 元</strong></span></div><div style="display:flex;gap:10px;margin:10px 0;"><button class="smallbtn" style="background:#fdf6ec;color:#e6a23c;" onclick="editExistingOrder('${esc(orderNo)}','${orderDate}','${raw}')">✏️ 修改订单</button><button class="smallbtn" style="background:#fef0f0;color:#f56c6c;border-color:#fde2e2;" onclick="deleteExistingOrder('${esc(orderNo)}','${raw}')">🗑️ 删除订单</button></div>${rows.map(r=>{const parts=[];if(r.wholeQty)parts.push(`${r.wholeQty}整 × ${money(r.wholePrice)}元`);if(r.looseQty)parts.push(`${r.looseQty}散 × ${money(r.loosePrice)}元`);return `<div class='item'><div style="font-weight:600;font-size:15px;color:var(--primary);margin-bottom:6px;">${esc(r.product_name)}</div><div class="detail-grid-container"><div class="detail-grid-item"><span>卖进：<strong>${parts.join(' + ')||'-'}</strong></span></div><div class="detail-grid-item"><span>金额：<strong style="color:var(--primary);font-size:14px;">${money(r.amount)}元</strong></span></div></div></div>`}).join('')}`}
async function deleteExistingOrder(orderNo,rawItemsEncoded){if(!confirm('确定删除本笔记录并返还库存量吗？'))return;document.getElementById('list').innerHTML=loadingHtml();try{const items=JSON.parse(decodeURIComponent(rawItemsEncoded)),ret={};items.forEach(it=>ret[it.barcode]=(ret[it.barcode]||0)+Number(it.qty||0));const{data}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code),live={};(data||[]).forEach(st=>live[st.product_barcode]=Number(st.qty)||0);const updates=Object.keys(ret).map(bc=>({employee_code:currentEmployee.code,product_barcode:bc,qty:Number(live[bc]||0)+Number(ret[bc]||0)}));await client.from('sales_order_items').delete().eq('order_no',orderNo);await client.from('sales_orders').delete().eq('order_no',orderNo);if(updates.length)await client.from('van_stocks').upsert(updates,{onConflict:'employee_code,product_barcode'});document.getElementById('list').getAttribute('data-from-report')==='true'?openSaleReport(selectedReportDate):openStoreHistory(currentStore.atom,currentStore.name)}catch(err){console.error(err);alert('❌ 删除失败，请重试');openStoreHistory(currentStore.atom,currentStore.name)}}
async function openSaleReport(preset='today'){STATE='REPORT';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');selectedReportDate=preset||'today';const range=getReportRange(selectedReportDate);renderReportLoading(selectedReportDate);try{let query=client.from('sales_orders').select('*').eq('employee_code',currentEmployee.code).order('created_at',{ascending:false});if(range.start)query=query.gte('created_at',`${range.start}T00:00:00`).lte('created_at',`${range.end}T23:59:59`);const{data:orders}=await query;if(!orders?.length){renderReportHtml(selectedReportDate,0,[]);return}const nos=orders.map(o=>o.order_no),{data:items}=await client.from('sales_order_items').select('*').in('order_no',nos);let total=0;const map={};orders.forEach(o=>{const d=o.created_at?o.created_at.split('T')[0]:'未知';map[o.order_no]={orderNo:o.order_no,orderDate:d,atomCode:o.atom_code,storeName:o.store_name||`未知门店(${o.atom_code})`,netRevenue:0,skuCount:0}});(items||[]).forEach(it=>{total+=Number(it.amount||0);if(map[it.order_no]){map[it.order_no].netRevenue+=Number(it.amount||0);map[it.order_no].skuCount+=1}});renderReportHtml(selectedReportDate,total,Object.values(map))}catch(e){document.getElementById('reportRows')?.insertAdjacentHTML('afterbegin',`<div style="color:red;padding:20px;">❌ 加载数据失败: ${e.message}</div>`)}}function renderReportHtml(preset,netSum,rows){const range=getReportRange(preset);document.getElementById('list').innerHTML=`<div class="big-store-title">📈 卖进数据</div>${reportFilterHtml(preset)}<div id="reportSummary" class="amount-summary-banner"><span>💵 <strong>${range.label}总实收：${money(netSum)} 元</strong></span></div><div id="reportRows">${rows.length===0?`<div class="sub" style="text-align:center;padding:40px;color:#aaa;">⚠️ 暂无报表记录</div>`:rows.map(r=>`<div class="history-item" style="cursor:pointer;border-left:4px solid var(--primary);padding:14px;margin-bottom:10px;" onclick="triggerReportDetailView('${esc(r.atomCode)}','${esc(r.storeName)}','${esc(r.orderNo)}','${esc(r.orderDate)}')"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:15px;color:var(--primary);">${esc(r.storeName)}</strong><span style="color:var(--text-muted);font-size:12px;background:#f4f2f5;padding:2px 6px;border-radius:4px;">${r.orderDate}</span></div><div style="font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;justify-content:space-between;width:100%;"><span>品项: <strong>${r.skuCount}</strong> 种</span><span style="color:#2b1d2c;font-weight:700;font-size:13px;">💵 实收：${money(r.netRevenue)} 元</span></div></div>`).join('')}</div>`}function triggerReportDetailView(atomCode,storeName,orderNo,orderDate){currentStore={atom:atomCode,name:storeName};viewOrderDetail(orderNo,orderDate,true)}
function editExistingOrder(orderNo,orderDate,rawItemsEncoded){isNewStoreFlow=false;templateEditOrNew(orderNo,orderDate,rawItemsEncoded)}function openOrder(atom,name){isNewStoreFlow=String(atom).startsWith('NEW_');templateEditOrNew(null,null,null,atom,name)}function initOrderItems(){products.forEach(p=>{orderData.items[p.id]=defaultItem(p)})}function templateEditOrNew(orderNo=null,orderDate=null,rawItemsEncoded=null,atom=null,name=null){STATE='ORDER';if(orderNo){const items=JSON.parse(decodeURIComponent(rawItemsEncoded));orderData={order_no:orderNo,atom:currentStore.atom,name:currentStore.name,date:orderDate,items:{},oldDbItemsMap:{}};initOrderItems();items.forEach(it=>{const p=products.find(x=>x.id==it.barcode);if(!p)return;const item=orderData.items[it.barcode],su=String(it.sale_unit||''),hasSale=it.sale_qty!=null;if(hasSale){if(su==='整'){item.wholeQty+=Number(it.sale_qty||0);item.wholePrice=Number(it.sale_unit_price??it.unit_price??item.wholePrice)}else{item.looseQty+=Number(it.sale_qty||0);item.loosePrice=Number(it.sale_unit_price??it.unit_price??item.loosePrice)}}else{const sp=splitQtyForEditor(Number(it.qty||0),p);item.wholeQty+=sp.wholeQty;item.looseQty+=sp.looseQty;item.wholePrice=Number(it.unit_price||0)*packSize(p);item.loosePrice=Number(it.unit_price||0)}orderData.oldDbItemsMap[it.barcode]=(orderData.oldDbItemsMap[it.barcode]||0)+Number(it.qty||0)})}else{const d=new Date(),today=dateOnly(d);orderData={atom,name,date:today,items:{},oldDbItemsMap:{}};initOrderItems()}if(products.length){const brands=orderedUnique(products,'brand');currentSelectedBrand=brands[0]||null;currentSelectedSpec=getSpecsForBrand(currentSelectedBrand)[0]||''}renderOrder()}
function calculateLiveOrderAmounts(){let s=0,count=0;products.forEach(p=>{const it=orderData.items[p.id];if(it){if(stockQtyFromItem(p,it)>0)count++;s+=amountFromItem(it)}});document.getElementById('liveAmountBanner').innerHTML=`<span style="font-size:15px;color:var(--primary);">💵 <strong>实时预估实收：${money(s)} 元</strong></span><br>选购品项：${count} 款`}function renderOrder(){STATE='ORDER';const list=orderedProducts(products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec));const isTemp=String(orderData.atom).startsWith('NEW_');document.getElementById('list').innerHTML=`<div class="big-store-title">${esc(orderData.name)} ${isTemp?'<span style="font-size:12px;background:#fff1f0;color:#ff4d4f;padding:2px 8px;border-radius:12px;vertical-align:middle;">新门店开单</span>':''}</div><div style='margin-bottom:8px;'>📅 日期：<span id='dateText'>${orderData.date}</span><div class="date-picker-wrapper"><button class='smallbtn'>修改日期</button><input type="date" class="real-date-input" value="${orderData.date}" onchange="syncSelectedDate(this.value)"></div></div><div id="liveAmountBanner" class="amount-summary-banner"></div>${generateFilterHeaderHtml()}${list.map(p=>{const it=orderData.items[p.id]||defaultItem(p);orderData.items[p.id]=it;return `<div class='item'><div class='prod-info'><div class='prod-name'>${esc(p.product_name)}</div><div class='sub'>整=扣 ${packSize(p)}${unitOf(p)}；散=扣 1${unitOf(p)}</div></div><div class='control-group'><div class='sell-line'><span class='sell-tag'>整</span><div class="picker-wrapper"><select class="ios-picker" onchange="changeQty('${esc(p.id)}','wholeQty',this.value)">${makeQtyOptions(50,it.wholeQty)}</select><span class="unit-txt">整</span></div><div class="picker-wrapper"><span class="label-txt">价格</span><input class="price-input" type="number" step="0.05" min="0" value="${money(it.wholePrice)}" onchange="changePrice('${esc(p.id)}','wholePrice',this.value)"><span class="unit-txt">元</span></div></div><div class='sell-line'><span class='sell-tag' style='background:#756676;'>散</span><div class="picker-wrapper"><select class="ios-picker" onchange="changeQty('${esc(p.id)}','looseQty',this.value)">${makeQtyOptions(100,it.looseQty)}</select><span class="unit-txt">${unitOf(p)}</span></div><div class="picker-wrapper"><span class="label-txt">价格</span><input class="price-input" type="number" step="0.05" min="0" value="${money(it.loosePrice)}" onchange="changePrice('${esc(p.id)}','loosePrice',this.value)"><span class="unit-txt">元</span></div></div></div></div>`}).join('')}<button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>`;calculateLiveOrderAmounts()}function changeQty(id,key,value){orderData.items[id][key]=parseInt(value)||0;calculateLiveOrderAmounts()}function changePrice(id,key,value){orderData.items[id][key]=Number(value)||0;calculateLiveOrderAmounts()}function syncSelectedDate(val){if(!val)return;orderData.date=val;document.getElementById('dateText').innerText=val}
async function submitOrder(){let grand=0;Object.keys(orderData.items).forEach(id=>{const p=products.find(x=>x.id==id);if(p)grand+=stockQtyFromItem(p,orderData.items[id])});if(grand===0){alert('⚠️ 空白单据无法提交！');return}const btn=document.querySelector('.float-submit');if(btn){btn.disabled=true;btn.innerText=LOADING_TEXT}try{let finalOrderNo=orderData.order_no;if(isNewStoreFlow&&!finalOrderNo){await client.from('employee_store_assets').insert({employee_code:String(currentEmployee.code),atom_code:String(orderData.atom),store_name:String(orderData.name)});stores.push({atom_code:orderData.atom,store_name:orderData.name});stores.sort((a,b)=>a.store_name.localeCompare(b.store_name,'zh-CN'));isNewStoreFlow=false}const{data:currentStocks}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code),live={};(currentStocks||[]).forEach(st=>live[st.product_barcode]=Number(st.qty)||0);const stockUpdates=[],itemsPayload=[];let total=0;for(const id of Object.keys(orderData.items)){const p=products.find(x=>x.id==id);if(!p)continue;const it=orderData.items[id],stockQty=stockQtyFromItem(p,it),oldDb=Number(orderData.oldDbItemsMap?.[id]||0),delta=stockQty-oldDb;if(delta!==0||stockQty>0)stockUpdates.push({product_barcode:String(id),qty:Number(live[id]||0)-delta});if(Number(it.wholeQty||0)>0){const qty=Number(it.wholeQty),price=Number(it.wholePrice||0),amount=qty*price;total+=amount;itemsPayload.push({barcode:String(id),product_name:String(p.product_name),qty:Number(qty*packSize(p)),unit_price:price,amount:Number(amount.toFixed(2)),sale_unit:'整',sale_qty:qty,sale_unit_price:price})}if(Number(it.looseQty||0)>0){const qty=Number(it.looseQty),price=Number(it.loosePrice||0),amount=qty*price;total+=amount;itemsPayload.push({barcode:String(id),product_name:String(p.product_name),qty:Number(qty),unit_price:price,amount:Number(amount.toFixed(2)),sale_unit:'散',sale_qty:qty,sale_unit_price:price})}}if(!finalOrderNo)finalOrderNo='SO'+Date.now()+Math.floor(Math.random()*1000);const{error}=await client.rpc('submit_sales_order_v2',{p_order_no:String(finalOrderNo),p_employee_code:String(currentEmployee.code),p_atom_code:String(orderData.atom),p_store_name:String(orderData.name),p_total_amount:Number(total.toFixed(2)),p_items:itemsPayload,p_stock_updates:stockUpdates});if(error)throw new Error(error.message);alert('✅ 开单成功');orderData=null;openStoreHistory(currentStore.atom,currentStore.name)}catch(err){console.error(err);alert(`❌ 账单保存失败: ${err.message||'网络错误'}`);if(btn){btn.disabled=false;btn.innerText='🚀 提交账单'}}}
function goBack(){if(STATE==='STORE'){sessionStorage.clear();location.href='index.html'}else if(STATE==='STOCK'||STATE==='REPORT'||STATE==='NEW_STORE_MGT'){orderData=null;selectedReportDate='today';renderStores()}else if(STATE==='DETAIL'){document.getElementById('list').getAttribute('data-from-report')==='true'?openSaleReport(selectedReportDate):renderHistory()}else if(STATE==='ORDER'){if(orderData?.order_no){const no=orderData.order_no,d=orderData.date,from=document.getElementById('list').getAttribute('data-from-report')==='true';orderData=null;viewOrderDetail(no,d,from)}else{const isTemp=String(orderData?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderHistory()}}else if(STATE==='HISTORY'){const isTemp=String(currentStore?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderStores()}}
