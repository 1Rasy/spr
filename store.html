function formatQtyToUnits(totalPcs, specCase, specBox) {
  let displayCases = Math.floor(totalPcs / specCase);
  let remPcs = totalPcs % specCase;
  if (specBox > 0) {
    let displayBoxes = Math.floor(remPcs / specBox);
    let displayPcs = remPcs % specBox;
    return `${displayCases}件 ${displayBoxes}盒 ${displayPcs}个`;
  } else {
    return `${displayCases}件 ${remPcs}个`;
  }
}

function parseRemarkFields(remarkStr, dbQty) {
  let returnQty = 0;
  let returnHandle = 'RESTORE';
  let giftQty = 0;
  if (remarkStr && typeof remarkStr === 'string') {
    const parts = remarkStr.split('_');
    if (parts.length >= 1) returnQty = parseInt(parts[0]) || 0;
    if (parts.length >= 2) returnHandle = parts[1] || 'RESTORE';
    const giftPart = parts.find(p => p.startsWith('GIFT:'));
    if (giftPart) giftQty = parseInt(giftPart.split(':')[1]) || 0;
  }
  let normalSaleBags = dbQty - giftQty;
  if (returnHandle === 'RESTORE') normalSaleBags += returnQty;
  return { normalSaleBags: Math.max(0, normalSaleBags), returnQty, returnHandle, giftQty };
}

      ...x, 
      id: x.barcode,             
      product_name: x.flavor,    
      spec: (x.spec || '常规').trim(),

async function loadStoresForCurrentEmployee() {
  const { data: assetsData, error } = await client.from('employee_store_assets').select('atom_code, store_name').eq('employee_code', currentEmployee.code);
  if (error) {
    console.error("加载门店失败:", error);
    document.getElementById('list').innerHTML = `<div class="sub" style="color:red;padding:20px;">❌ 门店加载失败: ${error.message}</div>`;
    return;
  }
  stores = (assetsData || []).map(x => ({
    atom_code: String(x.atom_code).trim(),
    store_name: (x.store_name || '未命名门店').trim()
  })).sort((a, b) => a.store_name.localeCompare(b.store_name, 'zh-CN'));

  renderStores();
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  clearBtn.style.display = (val && val.length > 0) ? 'block' : 'none';
  if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'STORE') renderStores();
}

function getSearch(){ return document.getElementById('search').value || ''; }

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) { console.error(e); }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  orderData = null; 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) { 
    sidebarEl.classList.remove('hide');
    sidebarEl.innerHTML = sortedLetters.map(l => `<div class="alphabet-letter" style="font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;margin:3px 0;" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('');
  } else {
    sidebarEl.classList.add('hide'); sidebarEl.innerHTML = '';
  }

  let listHtml = `
    <div style='font-size:15px; font-weight:700; color:var(--primary); margin: 0 0 10px 4px;'>当前业务员：${currentEmployee.name}</div>
    <div class="store-top-gates">

      <button class="btn-gate-half btn-gate-report" onclick="openSaleReport('')">📊 卖进数据</button>
      <button class="btn-gate-half btn-gate-newstore" onclick="openNewStoreManagement()">🆕 新门店</button>
    </div>
    <div style='font-size:13px; font-weight:700; color:var(--text-muted); margin: 0 0 14px 4px;'>门店总数：${stores.length} 家</div>
    <div class="store-container">
  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;
  } else {
    sortedLetters.forEach(letter => {
      listHtml += `<div id="group_letter_${letter}" class="letter-group-title">${letter}</div>`;
      groupedStores[letter].forEach(s => {
        const isTemp = String(s.atom_code).startsWith('NEW_');
        listHtml += `
          <div class='item' onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">
            <div class="item-main-row">
              <div>
                <strong style="font-size:16px;color:var(--primary);">${s.store_name} ${isTemp ? '<span style="font-size:11px;background:#fff1f0;color:#ff4d4f;padding:2px 6px;border-radius:12px;">新门店</span>' : ''}</strong>
                <div class='sub'>${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }
  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);

  const brands = [...new Set(products.map(p => p.brand))].filter(Boolean);

  const availableSpecs = [...new Set(products.filter(p => p.brand === currentSelectedBrand).map(p => p.spec))].filter(Boolean);

    currentSelectedSpec = availableSpecs[0];
  }

  return `
    <div class='brand-nav'>

  if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage();

function makePureQtyOptionsHtml(max, current) {
  let html = '';
  for(let i=0; i<=max; i++) {
    html += `<option value="${i}" ${i === current ? 'selected' : ''}>${i}</option>`;
  }
  return html;
}

function makePurePriceOptionsHtml(centerPrice, currentSelected) {
  let html = '';
  let start = Math.max(0.05, centerPrice - 15);
  let end = centerPrice + 30;
  let step = 0.05; 
  for (let p = start; p <= end; p += step) {
    let val = +p.toFixed(2);
    html += `<option value="${val}" ${Math.abs(val - currentSelected) < 0.015 ? 'selected' : ''}>${val.toFixed(2)}</option>`;
  }
  return html;
}

function renderStockPage(){
  STATE = 'STOCK';
  const displayProducts = products.filter(p => p.brand === currentSelectedBrand && p.spec === currentSelectedSpec);

  document.getElementById('list').innerHTML = `
    <div class='sub' style='font-weight:700;color:var(--primary); font-size:15px;'>🏢 车存配置：${currentEmployee.name}</div>
    ${generateFilterHeaderHtml()}
    ${displayProducts.map(p => {
      const specCase = p.pcs_per_case || 24; 
      const specBox = p.pcs_per_box || 0;
      const totalPcs = stockData.currentStockMap[p.id] || 0; 
      const formattedStockText = formatQtyToUnits(totalPcs, specCase, specBox);

      const currentDir = stockData.additions[p.id]?.dir || 'plus';
      const curC = stockData.additions[p.id]?.cases || 0;
      const curB = stockData.additions[p.id]?.boxes || 0;
      const curP = stockData.additions[p.id]?.pcs || 0;

      return `
        <div class="stock-row">
          <div style="font-weight:600; font-size:15px; color:var(--text-main);">${p.product_name}</div>
          <div style="font-size:13px; margin-top:6px; color:#333; background:#f0ebf1; padding:6px 10px; border-radius:6px;">
            当前车存量: <strong>${formattedStockText}</strong> (${totalPcs}个)
          </div>
          <div class="stock-input-group">
            <select class="stock-dir-select" onchange="updateStockInput('${p.id}', 'dir', this.value)">
              <option value="plus" ${currentDir === 'plus' ? 'selected' : ''}>➕ 增库</option>
              <option value="minus" ${currentDir === 'minus' ? 'selected' : ''}>➖ 减库</option>
            </select>
            <div class="picker-wrapper">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'cases', this.value)">${makePureQtyOptionsHtml(50, curC)}</select><span class="unit-txt">箱</span>
            </div>
            <div class="picker-wrapper ${specBox === 0 ? 'hide' : ''}">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'boxes', this.value)">${makePureQtyOptionsHtml(50, curB)}</select><span class="unit-txt">盒</span>
            </div>
            <div class="picker-wrapper">
              <select class="ios-picker" onchange="updateStockInput('${p.id}', 'pcs', this.value)">${makePureQtyOptionsHtml(100, curP)}</select><span class="unit-txt">散</span>
            </div>
          </div>
        </div>`;
    }).join('')}
    <button class='float-submit' onclick='submitStock()'>💾 更新库存</button>
  `;
}

function updateStockInput(prodId, type, val){
  if(!stockData.additions[prodId]) stockData.additions[prodId] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[prodId].dir = val;
  else stockData.additions[prodId][type] = parseInt(val) || 0;
}

async function submitStock(){
  const addIds = Object.keys(stockData.additions);
  let hasData = false; const updates = []; 

  for(let id of addIds){
    const p = products.find(x => x.id == id);
    const specCase = p.pcs_per_case || 24; 
    const specBox = p.pcs_per_box || 0;
    
    const dir = stockData.additions[id].dir || 'plus';
    const addedCases = stockData.additions[id].cases || 0;
    const addedBoxes = stockData.additions[id].boxes || 0;
    const addedPcs = stockData.additions[id].pcs || 0;

    let delta = specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs;
    if(delta > 0){
      hasData = true; const currentTotal = stockData.currentStockMap[id] || 0;
      let newTotal = dir === 'plus' ? currentTotal + delta : currentTotal - delta;
      if (newTotal < 0) { alert(`❌ [${p.product_name}] 车存可用数不足扣减！`); return; }
      updates.push({ employee_code: stockData.emp_code, product_barcode: id, qty: newTotal });
    }
  }
  if(!hasData){ alert("请输入变更量！"); return; }
  await client.from('van_stocks').upsert(updates, { onConflict: 'employee_code,product_barcode' });
  openStockManagement();
}

async function deleteExistingOrder(orderNo, rawItemsEncoded) {
  if (!confirm("确定要彻底销毁本笔账单记录并回滚车存数量吗？")) return;
  const listEl = document.getElementById('list');
  listEl.innerHTML = '<div style="color:#756676;padding:10px;">正在撤销单据并安全返还车存...</div>';

  try {
    const items = JSON.parse(decodeURIComponent(rawItemsEncoded));
    const { data: currentStocks } = await client.from('van_stocks').select('*').eq('employee_code', currentEmployee.code);
    const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_barcode] = Number(st.qty) || 0; });

    const stockUpdates = [];
    items.forEach(it => {
      const oldDbQty = Number(it.qty || 0); 
      const restoredStock = Number(liveStockMap[it.barcode] || 0) + oldDbQty;
      stockUpdates.push({ employee_code: currentEmployee.code, product_barcode: it.barcode, qty: restoredStock });
    });

    await client.from('sales_order_items').delete().eq('order_no', orderNo);
    await client.from('sales_orders').delete().eq('order_no', orderNo);
    if (stockUpdates.length > 0) {
      await client.from('van_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_barcode' });
    }
    openSaleReport(selectedReportDate);
  } catch (err) {
    console.error(err);
    alert("❌ 销毁失败，请重试");
    openSaleReport(selectedReportDate);
  }
}

async function openSaleReport(targetDate) {
  STATE = 'REPORT'; orderData = null;
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.add('hide');
  selectedReportDate = targetDate; 
  
  const loadingTxt = selectedReportDate ? `正在统计 ${selectedReportDate} 数据...` : "正在拉取全量卖进历史数据...";
  document.getElementById('list').innerHTML = `<div style="color:#756676;padding:10px;">⏳ ${loadingTxt}</div>`;

  try {
    let query = client.from('sales_orders').select('*').eq('employee_code', currentEmployee.code).order('created_at', { ascending: false }); 
    if(selectedReportDate) {
      query = query.gte('created_at', `${selectedReportDate}T00:00:00`).lte('created_at', `${selectedReportDate}T23:59:59`);
    }
    const { data: dayOrders } = await query;
    if(!dayOrders || dayOrders.length === 0) {
      renderReportHtml(selectedReportDate, 0, []); return;
    }

    const oNos = dayOrders.map(o => o.order_no);
    const { data: dayItems } = await client.from('sales_order_items').select('*').in('order_no', oNos);
    const itemsList = dayItems || [];
    let dayTotalSale = 0; const orderSummaryMap = {};

    dayOrders.forEach(o => {
      const displayDate = o.created_at ? o.created_at.split('T')[0] : '未知';
      orderSummaryMap[o.order_no] = { orderNo: o.order_no, orderDate: displayDate, atomCode: o.atom_code, storeName: o.store_name || `未知门店(${o.atom_code})`, netRevenue: 0, skuCount: 0 };
    });

    itemsList.forEach(it => {
      dayTotalSale += Number(it.amount || 0);
      if(orderSummaryMap[it.order_no]) {
        const targetOrder = orderSummaryMap[it.order_no];
        targetOrder.netRevenue += Number(it.amount || 0);
        targetOrder.skuCount += 1;
      }
    });
    renderReportHtml(selectedReportDate, dayTotalSale, Object.values(orderSummaryMap));
  } catch(e) {
    console.error(e);
    document.getElementById('list').innerHTML = `<div style="color:red;padding:20px;">❌ 加载数据失败: ${e.message}</div>`;
  }
}

function templateEditOrNew(orderNo=null, orderDate=null, rawItemsEncoded=null, atom=null, name=null) {
  STATE = 'ORDER';
  if(orderNo) {
    const items = JSON.parse(decodeURIComponent(rawItemsEncoded));
    orderData = { order_no: orderNo, atom: currentStore.atom, name: currentStore.name, date: orderDate, items: {}, oldDbItemsMap: {} };
    products.forEach(p => { orderData.items[p.id] = { cases: 0, boxes: 0, pcs: 0, price: p.default_price || 15, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; });
    items.forEach(it => {
      const pObj = products.find(x => x.id == it.barcode) || { pcs_per_case: 24, pcs_per_box: 0 };
      const parsed = parseRemarkFields(it.remark, Number(it.qty || 0));
      let totBags = parsed.normalSaleBags; 
      let curC = Math.floor(totBags / pObj.pcs_per_case);
      let rem = totBags % pObj.pcs_per_case;
      let curB = pObj.pcs_per_box > 0 ? Math.floor(rem / pObj.pcs_per_box) : 0;
      let curP = pObj.pcs_per_box > 0 ? rem % pObj.pcs_per_box : rem;
      orderData.items[it.barcode] = { cases: curC, boxes: curB, pcs: curP, price: Number(it.unit_price || 0), gift_qty: parsed.giftQty, return_qty: parsed.returnQty, return_handle: parsed.returnHandle, showPanel: parsed.returnQty > 0 || parsed.giftQty > 0 };
      orderData.oldDbItemsMap[it.barcode] = Number(it.qty || 0); 
    });
  } else {
    const d = new Date(); const today = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    orderData = { atom, name, date: today, items: {}, oldDbItemsMap: {} }; 
    products.forEach(p => { orderData.items[p.id] = { cases: 0, boxes: 0, pcs: 0, price: p.default_price || 15, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; });
  }

  if (products.length > 0) {
    const brands = [...new Set(products.map(p => p.brand))].filter(Boolean);
    currentSelectedBrand = brands.length > 0 ? brands[0] : null;
    const availableSpecs = [...new Set(products.filter(p => p.brand === currentSelectedBrand).map(p => p.spec))].filter(Boolean);
    currentSelectedSpec = availableSpecs.length > 0 ? availableSpecs[0] : "";
  }
  renderOrder();
}

function calculateLiveOrderAmounts() {
  let s = 0; let activeSKUCount = 0;
  products.forEach(p => {
    const item = orderData.items[p.id];
    if(item) {
      let normalSaleBags = (item.cases * p.pcs_per_case) + (item.boxes * p.pcs_per_box) + item.pcs;
      if(normalSaleBags > 0 || Number(item.gift_qty || 0) > 0 || Number(item.return_qty || 0) > 0) activeSKUCount++;
      const returnBags = Number(item.return_qty || 0);
      let chargedBags = Math.max(0, normalSaleBags - returnBags); 
      s += chargedBags * (Number(item.price || 0) / p.pcs_per_case); 
    }
  });
  document.getElementById('liveAmountBanner').innerHTML = `<span style="font-size:15px; color:var(--primary);">💵 <strong>实时预估实收：${s.toFixed(2)} 元</strong></span><br>选购品项：${activeSKUCount} 款`;
}

    <div id="liveAmountBanner" class="amount-summary-banner"></div>
    ${generateFilterHeaderHtml()}
    ${displayProducts.map(p => {
      const defaultPriceVal = p.default_price || 15; const specBox = p.pcs_per_box || 0; const itData = orderData.items[p.id];
      return `
        <div class='item'>
          <div class="item-main-row">
            <div class='prod-info'>

              <button id="btn_as_${p.id}" class="btn-aftersale-trigger ${itData.return_qty > 0 || itData.gift_qty > 0 ? 'active' : ''}" onclick="toggleAfterSalePanel('${p.id}')">🔄 搭赠 / 售后退货</button>

              <div class="picker-wrapper ${specBox === 0 ? 'hide' : ''}"><select class="ios-picker" onchange="pickerChangeCombinedQty('${p.id}', 'boxes', this.value)">${makePureQtyOptionsHtml(50, itData.boxes)}</select><span class="unit-txt">盒</span></div>
              <div class="picker-wrapper"><select class="ios-picker" onchange="pickerChangeCombinedQty('${p.id}', 'pcs', this.value)">${makePureQtyOptionsHtml(100, itData.pcs)}</select><span class="unit-txt">个</span></div>
              <div class="picker-wrapper" style="margin-left:auto;"><span class="label-txt">单价:</span><select class="ios-picker" onchange="pickerChangePrice('${p.id}', this.value)">${makePurePriceOptionsHtml(defaultPriceVal, itData.price)}</select><span class="unit-txt">元</span></div>
            </div>
          </div>
          <div id="panel_${p.id}" class="aftersale-panel ${itData.showPanel ? '' : 'hide'}">
            <div class="aftersale-row-picks">
              <div class="picker-wrapper" style="flex:1;"><span class="label-txt">退回:</span><select class="ios-picker" onchange="pickerChangeReturnQty('${p.id}', this.value)">${makePureQtyOptionsHtml(100, itData.return_qty)}</select><span class="unit-txt">个</span></div>
              <div class="picker-wrapper" style="flex:1;"><span class="label-txt">赠送:</span><select class="ios-picker" onchange="pickerChangeGiftQty('${p.id}', this.value)">${makePureQtyOptionsHtml(50, itData.gift_qty)}</select><span class="unit-txt">袋</span></div>
            </div>
            <div class="aftersale-options">
              <label><input type="radio" name="handle_${p.id}" value="RESTORE" ${itData.return_handle!=='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','RESTORE')">🟢 能卖 (良退)</label>
              <label><input type="radio" name="handle_${p.id}" value="SCRAP" ${itData.return_handle==='SCRAP'?'checked':''} onchange="setReturnHandle('${p.id}','SCRAP')">🔴 过期 (损耗)</label>
            </div>
          </div>
        </div>`;
    }).join('')}
    <button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>
  `;
  calculateLiveOrderAmounts();
}

function initItemState(id) {
  if(!orderData.items[id]){ const p = products.find(x => x.id == id); orderData.items[id] = { cases: 0, boxes: 0, pcs: 0, price: p.default_price || 15, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE', showPanel: false }; }
}
function pickerChangeCombinedQty(id, type, value) { initItemState(id); orderData.items[id][type] = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangePrice(id, value) { 
  initItemState(id); const targetPrice = parseFloat(value) || 0; const currentProd = products.find(x => x.id == id); if (!currentProd) return;
  products.filter(p => p.brand === currentProd.brand && p.spec === currentProd.spec).forEach(p => { initItemState(p.id); orderData.items[p.id].price = targetPrice; });
  renderOrder();
}
function pickerChangeGiftQty(id, value) { initItemState(id); orderData.items[id].gift_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function pickerChangeReturnQty(id, value) { initItemState(id); orderData.items[id].return_qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }
function toggleAfterSalePanel(id) { initItemState(id); orderData.items[id].showPanel = !orderData.items[id].showPanel; renderOrder(); }
function setReturnHandle(id, h) { initItemState(id); orderData.items[id].return_handle = h; calculateLiveOrderAmounts(); }
function syncSelectedDate(val){ if(!val) return; orderData.date = val; document.getElementById('dateText').innerText = val; }

async function submitOrder(){
  let grandTotalQty = 0;
  Object.keys(orderData.items).forEach(id => {
    const it = orderData.items[id]; const p = products.find(x => x.id == id) || { pcs_per_case: 24, pcs_per_box: 0 };
    grandTotalQty += (Number(it.cases || 0) * p.pcs_per_case) + (Number(it.boxes || 0) * p.pcs_per_box) + Number(it.pcs || 0) + Number(it.gift_qty || 0) + Number(it.return_qty || 0);
  });
  if (grandTotalQty === 0) { alert("⚠️ 空白单据无法提交！"); return; }

  const submitBtn = document.querySelector('.float-submit');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '⏳ 正在保存...'; }

  try {
    let finalOrderNo = orderData.order_no;
    if (isNewStoreFlow && !finalOrderNo) {
      await client.from('employee_store_assets').insert({ employee_code: String(currentEmployee.code), atom_code: String(orderData.atom), store_name: String(orderData.name) });
      stores.push({ atom_code: orderData.atom, store_name: orderData.name });
      stores.sort((a, b) => a.store_name.localeCompare(b.store_name, 'zh-CN'));
      isNewStoreFlow = false; 
    }

    const { data: currentStocks } = await client.from('van_stocks').select('*').eq('employee_code', currentEmployee.code);
    const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_barcode] = Number(st.qty) || 0; });

    const stockUpdatesPayload = []; const formattedItemsPayload = []; let totalBillAmount = 0;
    const allProdIds = new Set([...Object.keys(orderData.items), ...Object.keys(orderData.oldDbItemsMap || {})]);

    for (let id of allProdIds) {
      const p = products.find(x => x.id == id); if(!p) continue;
      const item = orderData.items[id] || { cases: 0, boxes: 0, pcs: 0, price: p.default_price||15, gift_qty: 0, return_qty: 0, return_handle: 'RESTORE' };
      const oldDbQty = Number(orderData.oldDbItemsMap?.[id] || 0); 
      
      let normalSaleBags = (Number(item.cases || 0) * p.pcs_per_case) + (Number(item.boxes || 0) * p.pcs_per_box) + Number(item.pcs || 0);
      let calculatedDbQty = normalSaleBags + Number(item.gift_qty || 0);
      if (item.return_handle === 'RESTORE') calculatedDbQty -= Number(item.return_qty || 0);

      const delta = calculatedDbQty - oldDbQty; 
      const finalStockQty = Number(liveStockMap[id] || 0) - delta;

      if (delta !== 0 || normalSaleBags > 0 || Number(item.return_qty||0) > 0 || Number(item.gift_qty||0) > 0) {
        stockUpdatesPayload.push({ product_barcode: String(id), qty: Number(finalStockQty) });
      }

      if(normalSaleBags > 0 || Number(item.gift_qty||0) > 0 || Number(item.return_qty||0) > 0) {
        let chargedBags = Math.max(0, normalSaleBags - Number(item.return_qty || 0));
        let itemAmount = chargedBags * (Number(item.price || 0) / p.pcs_per_case);
        totalBillAmount += itemAmount;
        formattedItemsPayload.push({ barcode: String(id), product_name: String(p.product_name), qty: Number(calculatedDbQty), unit_price: Number(item.price || 0), amount: Number(itemAmount.toFixed(2)), remark: `${Number(item.return_qty || 0)}_${item.return_handle || 'RESTORE'}_GIFT:${Number(item.gift_qty || 0)}` });
      }
    }

    if (!finalOrderNo) finalOrderNo = 'SO' + Date.now() + Math.floor(Math.random() * 1000);

    // 联动送交Supabase的后端高级回滚存储事务（RPC）
    const { error: rpcError } = await client.rpc('submit_sales_order_v2', { p_order_no: String(finalOrderNo), p_employee_code: String(currentEmployee.code), p_atom_code: String(orderData.atom), p_store_name: String(orderData.name), p_total_amount: Number(totalBillAmount.toFixed(2)), p_items: formattedItemsPayload, p_stock_updates: stockUpdatesPayload });
    if (rpcError) throw new Error(rpcError.message);

    orderData = null; 
    openStoreHistory(currentStore.atom, currentStore.name);
  } catch (err) {
    console.error(err);
    alert(`❌ 账单保存被拦截: ${err.message || '网络错误'}`);
    if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 提交账单'; }
  }
}

function goBack(){
  if (STATE === 'STORE') {
    // 跨 HTML 文件联动：退出当前员工，清理 sessionStorage 缓存，稳健跳回主界面
    sessionStorage.clear();
    window.location.href = "index.html";
  }
  else if(STATE === 'STOCK' || STATE === 'REPORT' || STATE === 'NEW_STORE_MGT') {
    orderData = null; selectedReportDate = ""; renderStores(); 
  }
  else if(STATE === 'DETAIL') {
    if(document.getElementById('list').getAttribute('data-from-report') === 'true') openSaleReport(selectedReportDate);
    else renderHistory();
  }
  else if(STATE === 'ORDER') {
    if(orderData?.order_no) {
      const savedNo = orderData.order_no; const savedDate = orderData.date;
      const isFromReport = document.getElementById('list').getAttribute('data-from-report') === 'true';
      orderData = null; viewOrderDetail(savedNo, savedDate, isFromReport);
    } else {
      const isTemp = String(orderData?.atom).startsWith('NEW_'); orderData = null;
      if (isTemp) openNewStoreManagement(); else renderHistory();
    }
  }
  else if(STATE === 'HISTORY') {
    const isTemp = String(currentStore?.atom).startsWith('NEW_'); orderData = null;
    if (isTemp) openNewStoreManagement(); else renderStores(); 
  }
}

init();
</script>
