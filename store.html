<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>
:root{--primary:#4A154B;--bg-main:#f4f2f5;--text-main:#1f1121;--text-muted:#756676;--card-bg:#fff;--line:#e2dde3;--danger:#f56c6c;--blue:#1890ff}*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:var(--bg-main);color:var(--text-main);padding-bottom:90px;-webkit-tap-highlight-color:transparent}.card{background:var(--card-bg);margin:12px;padding:16px;border-radius:12px;box-shadow:0 4px 12px rgba(74,21,75,.03);position:relative}.top-action-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.back-btn{display:inline-flex;align-items:center;justify-content:center;background:#f4f2f5;color:var(--text-main);padding:10px 18px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line)}.back-btn:active{background:#e2dde3;transform:scale(.97)}.back-btn::before{content:"←";margin-right:6px;font-weight:bold;font-size:16px}.big-store-title{font-size:22px;font-weight:800;color:#111827;margin:4px 0 14px;letter-spacing:-.5px}.store-container{padding-right:24px}.letter-group-title{background:#f4f2f5;color:var(--primary);font-weight:700;font-size:14px;padding:4px 8px;margin:12px 0 6px;border-radius:4px}.item{padding:14px 4px;border-bottom:1px solid #f4f2f5;width:100%}.item-main-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-direction:column}.prod-info{width:100%;min-width:0}.prod-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--primary)}.control-group{display:flex;align-items:center;gap:6px;width:100%;margin-top:8px;flex-wrap:wrap}.picker-wrapper{display:inline-flex;align-items:center;gap:3px;font-size:13px;color:var(--text-muted)}.label-txt{font-weight:500;color:#665c67}.unit-txt{font-weight:600;color:var(--text-main);font-size:13px}.ios-picker{background:#f4f2f5;color:var(--text-main);border:1px solid #dcd6dd;border-radius:6px;padding:6px;font-size:14px;font-weight:700;outline:none;cursor:pointer;appearance:none;text-align:center;min-width:44px}.store-top-gates{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}.btn-gate-half{color:#fff;padding:12px 4px;border-radius:10px;font-size:13px;font-weight:700;text-align:center;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;box-shadow:0 4px 10px rgba(74,21,75,.12)}.btn-gate-stock{background:linear-gradient(135deg,var(--primary),#6b266c)}.btn-gate-report{background:linear-gradient(135deg,#1890ff,#0050b3)}.btn-gate-newstore{background:linear-gradient(135deg,#ff9c6e,#ff4d4f)}.btn-new-order{background:var(--primary);color:#fff;padding:12px;width:100%;border-radius:8px;font-size:16px;font-weight:600;margin-bottom:15px;text-align:center;border:none}.smallbtn{background:#f4f2f5;color:var(--text-main);border:1px solid var(--line);padding:5px 10px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer}.date-picker-wrapper{position:relative;display:inline-block}.real-date-input{position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer}.search-wrapper{position:relative;margin:4px 0 12px;width:100%}.search-wrapper input{width:100%;padding:12px 40px 12px 12px;border:1px solid #dcd6dd;border-radius:8px;font-size:16px;background:#faf9fa}.search-clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:#e2dde3;color:#756676;border-radius:50%;text-align:center;line-height:20px;font-size:12px;cursor:pointer;font-weight:bold;display:none;z-index:5}.brand-nav{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 6px}.brand-badge{background:#f4f2f5;color:var(--text-muted);padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;border:1px solid transparent}.brand-badge.active{background:#fbf4fc;color:var(--primary);border:1px solid #eecbf5}.spec-nav{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 12px;padding:6px 0;border-bottom:1px dashed #e2dde3}.spec-badge{background:#fff;color:#665c67;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #e2dde3;font-weight:500}.spec-badge.active{background:var(--primary);color:#fff;border-color:var(--primary)}.sub{font-size:13px;color:var(--text-muted);margin-top:2px}.hide{display:none!important}.history-item{background:#faf9fa;padding:14px 16px;margin-bottom:10px;border-radius:8px;border:1px solid #eeeade;display:flex;flex-direction:column;align-items:flex-start;gap:8px}.float-submit{position:fixed;right:20px;bottom:24px;z-index:99;background:var(--primary);color:#fff;border:none;padding:14px 26px;border-radius:50px;font-size:16px;font-weight:700;box-shadow:0 8px 16px rgba(74,21,75,.3)}.stock-row{display:flex;flex-direction:column;width:100%;background:#faf9fa;padding:12px;border-radius:8px;border:1px solid #eee;margin-bottom:10px}.stock-qty{font-size:13px;margin-top:6px;color:#333;background:#f0ebf1;padding:6px 10px;border-radius:6px}.alphabet-sidebar{position:fixed;right:16px;top:140px;bottom:100px;width:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:90;background:rgba(255,255,255,.85);border-radius:12px;box-shadow:0 2px 8px rgba(74,21,75,.08);border:1px solid #eeeade;user-select:none}.amount-summary-banner{background:#fdfdfd;border:1px solid #ebdfee;border-left:5px solid var(--primary);padding:10px 12px;border-radius:6px;margin:10px 0;font-size:14px;color:#2b1d2c}.detail-grid-container{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:4px;font-size:13px;color:var(--text-muted);line-height:1.4}.detail-grid-item{display:flex;justify-content:space-between;align-items:center}@media(max-width:560px){.store-top-gates{grid-template-columns:1fr}.detail-grid-container{grid-template-columns:1fr}.float-submit{right:14px;bottom:18px}.alphabet-sidebar{right:8px}}
</style>

<body>
<div class="card">
  <div id="searchBlock" class="search-wrapper"><input id="search" placeholder="🔍 输入门店名称或编码搜索店铺..." oninput="handleSearch()"><div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div></div>
  <div class="top-action-bar"><div id="back" class="back-btn" onclick="goBack()">返回</div></div>
  <div id="list"></div><div id="alphabetSidebar" class="alphabet-sidebar hide"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>
<script>
const SUPABASE_URL="https://wyjbnnqhiehjccmojbbg.supabase.co";
const SUPABASE_KEY="sb"+"_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG";
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const currentEmployee={code:sessionStorage.getItem('current_employee_code'),name:sessionStorage.getItem('current_employee_name')};
if(!currentEmployee.code){alert('当前无登录员工，请重新选择员工！');window.location.href='index.html';}
let STATE='STORE',stores=[],products=[],currentStore=null,orderData=null,currentSelectedBrand=null,currentSelectedSpec='ALL',historyOrders=[],stockData={},selectedReportDate='',isNewStoreFlow=false;
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function num(v,d=0){const n=Number(v);return Number.isFinite(n)?n:d;}
function productSortValue(p){const s=Number(p.sort_order);if(Number.isFinite(s)&&s>0)return s;const i=Number(p.db_id||p.raw_id||0);return Number.isFinite(i)&&i>0?i*10:999999;}
function compareProducts(a,b){const d=productSortValue(a)-productSortValue(b);if(d!==0)return d;return String(a.name||a.product_name||a.id).localeCompare(String(b.name||b.product_name||b.id),'zh-CN',{numeric:true});}
function orderedProducts(list=products){return [...list].sort(compareProducts);}
function orderedUnique(list,field){const seen=new Set(),out=[];orderedProducts(list).forEach(p=>{const v=(p[field]||'').trim?.()??p[field];if(v&&!seen.has(v)){seen.add(v);out.push(v);}});return out;}
function unitOf(p){return p?.unit||'个';}
function formatQtyToUnits(totalPcs,specCase,specBox,unit='个'){const sign=Number(totalPcs)<0?'-':'';let rest=Math.abs(Number(totalPcs)||0);const caseSize=Number(specCase)||1;const boxSize=Number(specBox)||0;const displayCases=Math.floor(rest/caseSize);rest=rest%caseSize;if(boxSize>0){const displayBoxes=Math.floor(rest/boxSize);const displayPcs=rest%boxSize;return `${sign}${displayCases}件 ${displayBoxes}盒 ${displayPcs}${unit}`;}return `${sign}${displayCases}件 ${rest}${unit}`;}
async function init(){try{document.getElementById('list').innerHTML='<div style="color:#756676;padding:10px;">正在加载...</div>';const p=await client.from('products').select('*').eq('is_active',true).order('sort_order',{ascending:true}).order('id',{ascending:true});products=(p.data||[]).map(x=>({...x,raw_id:x.id,db_id:x.id,id:String(x.barcode),product_name:x.flavor||x.name||x.barcode,spec:(x.spec||'常规').trim(),brand:(x.brand||'未分类').trim(),unit:(x.unit||'个').trim(),pcs_per_box:parseInt(x.pcs_per_box)||0,pcs_per_case:parseInt(x.pcs_per_case)||24,sort_order:Number(x.sort_order||0)})).sort(compareProducts);await loadStoresForCurrentEmployee();}catch(err){console.error(err);document.getElementById('list').innerHTML='<div style="color:red;padding:10px;">❌ 页面初始化失败，请重试</div>';}}
async function loadStoresForCurrentEmployee(){const{data,error}=await client.from('employee_store_assets').select('atom_code, store_name').eq('employee_code',currentEmployee.code);if(error){document.getElementById('list').innerHTML=`<div class="sub" style="color:red;padding:20px;">❌ 门店加载失败: ${error.message}</div>`;return;}stores=(data||[]).map(x=>({atom_code:String(x.atom_code).trim(),store_name:(x.store_name||'未命名门店').trim()})).sort((a,b)=>a.store_name.localeCompare(b.store_name,'zh-CN'));renderStores();}
function handleSearch(){const val=document.getElementById('search').value;document.getElementById('clearSearch').style.display=(val&&val.length>0)?'block':'none';if(STATE==='STORE')renderStores();}
function clearSearchInput(){document.getElementById('search').value='';document.getElementById('clearSearch').style.display='none';if(STATE==='STORE')renderStores();}
function getSearch(){return document.getElementById('search').value||'';}
function getStoreFirstLetter(storeName){if(!storeName)return'#';try{const firstChar=storeName.trim().charAt(0);const py=pinyinPro.pinyin(firstChar,{pattern:'first',toneType:'none'});const letter=(py||'').charAt(0).toUpperCase();if(/[A-Z]/.test(letter))return letter;}catch(e){}return'#';}
function renderStores(){STATE='STORE';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.remove('hide');document.getElementById('search').placeholder='🔍 输入门店名称或编码搜索店铺...';const k=getSearch();const f=stores.filter(s=>(s.store_name||'').includes(k)||(s.atom_code||'').includes(k));const grouped={},letters=new Set();f.forEach(s=>{const l=getStoreFirstLetter(s.store_name);if(!grouped[l])grouped[l]=[];grouped[l].push(s);letters.add(l);});const sortedLetters=Array.from(letters).sort();const sidebar=document.getElementById('alphabetSidebar');if(sortedLetters.length>1&&!k&&f.length>10){sidebar.classList.remove('hide');sidebar.innerHTML=sortedLetters.map(l=>`<div style="font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;margin:3px 0;" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('');}else{sidebar.classList.add('hide');sidebar.innerHTML='';}let html=`<div style='font-size:15px;font-weight:700;color:var(--primary);margin:0 0 10px 4px;'>当前业务员：${esc(currentEmployee.name)}</div><div class="store-top-gates"><button class="btn-gate-half btn-gate-stock" onclick="openStockManagement()">📦 库存管理</button><button class="btn-gate-half btn-gate-report" onclick="openSaleReport('')">📊 卖进数据</button><button class="btn-gate-half btn-gate-newstore" onclick="openNewStoreManagement()">🆕 新门店</button></div><div style='font-size:13px;font-weight:700;color:var(--text-muted);margin:0 0 14px 4px;'>门店总数：${stores.length} 家</div><div class="store-container">`;if(!sortedLetters.length)html+=`<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;else sortedLetters.forEach(l=>{html+=`<div id="group_letter_${l}" class="letter-group-title">${l}</div>`;grouped[l].forEach(s=>{const isTemp=String(s.atom_code).startsWith('NEW_');html+=`<div class='item' onclick="openStoreHistory('${esc(s.atom_code)}','${esc(s.store_name)}')"><div class="item-main-row"><div><strong style="font-size:16px;color:var(--primary);">${esc(s.store_name)} ${isTemp?'<span style="font-size:11px;background:#fff1f0;color:#ff4d4f;padding:2px 6px;border-radius:12px;">新门店</span>':''}</strong><div class='sub'>${esc(s.atom_code)}</div></div></div></div>`;});});html+='</div>';document.getElementById('list').innerHTML=html;}
function scrollToLetterGroup(letter){const target=document.getElementById(`group_letter_${letter}`);if(target)target.scrollIntoView({behavior:'smooth',block:'start'});}
function openNewStoreManagement(){STATE='NEW_STORE_MGT';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');const newStores=stores.filter(s=>String(s.atom_code).startsWith('NEW_'));document.getElementById('list').innerHTML=`<div class="big-store-title">🆕 新门店开单管理</div><button class="btn-new-order" style="background:linear-gradient(135deg,#ff9c6e,#ff4d4f);" onclick="triggerCreateNewStore()">＋ 创建新门店并开单</button><div style='font-size:14px;font-weight:800;color:var(--primary);margin:18px 0 8px 4px;'>已开单的新门店列表 (${newStores.length})</div>${newStores.length===0?`<div class="sub" style="text-align:center;padding:40px;color:#aaa;background:#faf9fa;border-radius:8px;border:1px dashed #e2dde3;">暂无自主创建的新门店信息</div>`:newStores.map(s=>`<div class="history-item" style="border-left:4px solid #ff7875;"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><div><strong style="font-size:16px;color:var(--primary);">${esc(s.store_name)}</strong><div class="sub" style="font-size:12px;">临时编码: ${esc(s.atom_code)}</div></div><button class="smallbtn" style="background:var(--primary);color:#fff;border:none;padding:6px 12px;" onclick="openStoreHistory('${esc(s.atom_code)}','${esc(s.store_name)}')">去开单 / 历史 →</button></div></div>`).join('')}`;}
function triggerCreateNewStore(){const storeName=prompt('请输入自定义新门店的名称:');if(!storeName||!storeName.trim()){if(storeName!==null)alert('门店名称不能为空！');return;}const tempAtomCode=`NEW_${Math.random().toString(36).substring(2,8).toUpperCase()}`;isNewStoreFlow=true;currentStore={atom:tempAtomCode,name:storeName.trim()};templateEditOrNew(null,null,null,tempAtomCode,storeName.trim());}
function getFirstBrand(){return orderedUnique(products,'brand')[0]||null;}
function getSpecsForBrand(brand){return orderedUnique(products.filter(p=>p.brand===brand),'spec');}
async function openStockManagement(){STATE='STOCK';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('alphabetSidebar').innerHTML='';document.getElementById('searchBlock').classList.add('hide');document.getElementById('list').innerHTML='<div style="color:#756676;padding:10px;">正在加载...</div>';const{data}=await client.from('van_stocks').select('product_barcode, qty').eq('employee_code',currentEmployee.code);const stockMap={};(data||[]).forEach(st=>{stockMap[st.product_barcode]=Number(st.qty)||0;});stockData={emp_code:currentEmployee.code,currentStockMap:stockMap};if(!currentSelectedBrand)currentSelectedBrand=getFirstBrand();const specs=getSpecsForBrand(currentSelectedBrand);currentSelectedSpec=specs[0]||'';renderStockPage();}
function generateFilterHeaderHtml(){const brands=orderedUnique(products,'brand');if(!currentSelectedBrand&&brands.length)currentSelectedBrand=brands[0];const specs=getSpecsForBrand(currentSelectedBrand);if(!specs.includes(currentSelectedSpec)&&specs.length)currentSelectedSpec=specs[0];return `<div class='brand-nav'>${brands.map(b=>`<div class="brand-badge ${b===currentSelectedBrand?'active':''}" onclick="selectBrand('${esc(b)}')">${esc(b)}</div>`).join('')}</div><div class='spec-nav'>${specs.map(sp=>`<div class="spec-badge ${currentSelectedSpec===sp?'active':''}" onclick="selectSpec('${esc(sp)}')">${esc(sp)}</div>`).join('')}</div>`;}
function selectBrand(brandName){currentSelectedBrand=brandName;const specs=getSpecsForBrand(currentSelectedBrand);currentSelectedSpec=specs[0]||'';if(STATE==='ORDER')renderOrder();else if(STATE==='STOCK')renderStockPage();}
function selectSpec(specName){currentSelectedSpec=specName;if(STATE==='ORDER')renderOrder();else if(STATE==='STOCK')renderStockPage();}
function makePureQtyOptionsHtml(max,current){let html='';for(let i=0;i<=max;i++)html+=`<option value="${i}" ${i===Number(current)?'selected':''}>${i}</option>`;return html;}
function makePurePriceOptionsHtml(centerPrice,currentSelected){let html='',start=Math.max(.05,Number(centerPrice||0)-15),end=Number(centerPrice||0)+30;for(let p=start;p<=end;p+=.05){let val=+p.toFixed(2);html+=`<option value="${val}" ${Math.abs(val-Number(currentSelected))<.015?'selected':''}>${val.toFixed(2)}</option>`;}return html;}
function renderStockPage(){STATE='STOCK';const displayProducts=orderedProducts(products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec));document.getElementById('list').innerHTML=`<div class='sub' style='font-weight:700;color:var(--primary);font-size:15px;'>🏢 库存查看：${esc(currentEmployee.name)}</div>${generateFilterHeaderHtml()}${displayProducts.map(p=>{const specCase=p.pcs_per_case||24,specBox=p.pcs_per_box||0,totalPcs=stockData.currentStockMap[p.id]||0,formatted=formatQtyToUnits(totalPcs,specCase,specBox,unitOf(p));return `<div class="stock-row"><div style="font-weight:600;font-size:15px;color:var(--text-main);">${esc(p.product_name)}</div><div class="stock-qty">当前库存量: <strong>${formatted}</strong> (${totalPcs}${unitOf(p)})</div></div>`;}).join('')}`;}
async function openStoreHistory(atom,name){STATE='HISTORY';currentStore={atom,name};document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');document.getElementById('list').innerHTML='<div style="color:#756676;padding:10px;">正在加载...</div>';const{data:ordersData}=await client.from('sales_orders').select('*').eq('atom_code',atom).order('created_at',{ascending:false});historyOrders=ordersData||[];if(historyOrders.length){const oNos=historyOrders.map(o=>o.order_no);const{data:itemsData}=await client.from('sales_order_items').select('*').in('order_no',oNos);const allItems=itemsData||[];historyOrders.forEach(o=>{const oItems=allItems.filter(it=>it.order_no===o.order_no);o.skuCount=oItems.length;o.saleSum=oItems.reduce((s,it)=>s+Number(it.amount||0),0);});}renderHistory();}
function renderHistory(){STATE='HISTORY';const isTemp=String(currentStore.atom).startsWith('NEW_');document.getElementById('list').innerHTML=`<div class="big-store-title">${esc(currentStore.name)} ${isTemp?'<span style="font-size:12px;background:#fff1f0;color:#ff4d4f;padding:2px 8px;border-radius:12px;vertical-align:middle;">新门店</span>':''}</div><div style="margin:14px 0;"><button class="btn-new-order" onclick="openOrder('${esc(currentStore.atom)}','${esc(currentStore.name)}')">＋ 新增单据</button></div>${historyOrders.map(o=>{const bDate=o.created_at?o.created_at.split('T')[0]:'未知日期';return `<div class="history-item" onclick="viewOrderDetail('${esc(o.order_no)}','${bDate}',false)"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><span style="color:var(--primary);font-size:14px;font-weight:bold;">💵 实收：${(o.saleSum||0).toFixed(2)} 元</span><span style="color:var(--primary);font-size:14px;">详情 →</span></div><div style="font-size:13px;color:var(--text-muted);line-height:1.45;margin-top:4px;">品项数: ${o.skuCount||0} 款 | 日期: ${bDate}</div></div>`;}).join('')}`;}
async function viewOrderDetail(orderNo,orderDate,fromReport=false){STATE='DETAIL';document.getElementById('list').setAttribute('data-from-report',fromReport?'true':'false');document.getElementById('list').innerHTML='<div style="color:#756676;padding:10px;">正在加载...</div>';const{data}=await client.from('sales_order_items').select('*').eq('order_no',orderNo);const items=data||[];let raw=encodeURIComponent(JSON.stringify(items));let sum=items.reduce((s,it)=>s+Number(it.amount||0),0);document.getElementById('list').innerHTML=`<div class="big-store-title">${currentStore?esc(currentStore.name):'客户账单'}</div><div class="amount-summary-banner"><span style="font-size:16px;color:var(--primary);">💵 <strong>账单实收：${sum.toFixed(2)} 元</strong></span></div><div style="display:flex;gap:10px;margin:10px 0;"><button class="smallbtn" style="background:#fdf6ec;color:#e6a23c;" onclick="editExistingOrder('${esc(orderNo)}','${orderDate}','${raw}')">✏️ 修改订单</button><button class="smallbtn" style="background:#fef0f0;color:#f56c6c;border-color:#fde2e2;" onclick="deleteExistingOrder('${esc(orderNo)}','${raw}')">🗑️ 删除订单</button></div>${items.map(it=>{const p=products.find(x=>x.id==it.barcode)||{pcs_per_case:24,pcs_per_box:0,unit:'个'};const formatted=formatQtyToUnits(Number(it.qty||0),p.pcs_per_case,p.pcs_per_box,unitOf(p));return `<div class='item'><div style="font-weight:600;font-size:15px;color:var(--primary);margin-bottom:6px;">${esc(it.product_name||'未知商品')}</div><div class="detail-grid-container"><div class="detail-grid-item"><span>实收单项: <strong style="color:var(--primary);font-size:14px;">${Number(it.amount||0).toFixed(2)}元</strong></span></div><div class="detail-grid-item" style="text-align:right;justify-content:flex-end;"><span>销售数量: <strong>${formatted}</strong></span></div><div class="detail-grid-item"><span>散件单价: <strong>${Number(it.unit_price||0).toFixed(2)}元</strong></span></div></div></div>`;}).join('')}`;}
async function deleteExistingOrder(orderNo,rawItemsEncoded){if(!confirm('确定删除单据？'))return;document.getElementById('list').innerHTML='<div style="color:#756676;padding:10px;">正在删除...</div>';try{const items=JSON.parse(decodeURIComponent(rawItemsEncoded));const{data}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code);const live={};(data||[]).forEach(st=>{live[st.product_barcode]=Number(st.qty)||0;});const updates=items.map(it=>({employee_code:currentEmployee.code,product_barcode:it.barcode,qty:Number(live[it.barcode]||0)+Number(it.qty||0)}));await client.from('sales_order_items').delete().eq('order_no',orderNo);await client.from('sales_orders').delete().eq('order_no',orderNo);if(updates.length)await client.from('van_stocks').upsert(updates,{onConflict:'employee_code,product_barcode'});if(document.getElementById('list').getAttribute('data-from-report')==='true')openSaleReport(selectedReportDate);else openStoreHistory(currentStore.atom,currentStore.name);}catch(err){console.error(err);alert('❌ 删除失败，请重试');openStoreHistory(currentStore.atom,currentStore.name);}}
async function openSaleReport(targetDate){STATE='REPORT';orderData=null;document.getElementById('alphabetSidebar').classList.add('hide');document.getElementById('searchBlock').classList.add('hide');selectedReportDate=targetDate;document.getElementById('list').innerHTML=`<div style="color:#756676;padding:10px;">⏳ ${selectedReportDate?`正在统计 ${selectedReportDate} 数据...`:'正在加载数据...'}</div>`;try{let query=client.from('sales_orders').select('*').eq('employee_code',currentEmployee.code).order('created_at',{ascending:false});if(selectedReportDate)query=query.gte('created_at',`${selectedReportDate}T00:00:00`).lte('created_at',`${selectedReportDate}T23:59:59`);const{data:dayOrders}=await query;if(!dayOrders||!dayOrders.length){renderReportHtml(selectedReportDate,0,[]);return;}const oNos=dayOrders.map(o=>o.order_no);const{data:dayItems}=await client.from('sales_order_items').select('*').in('order_no',oNos);const items=dayItems||[];let total=0;const map={};dayOrders.forEach(o=>{const d=o.created_at?o.created_at.split('T')[0]:'未知';map[o.order_no]={orderNo:o.order_no,orderDate:d,atomCode:o.atom_code,storeName:o.store_name||`未知门店(${o.atom_code})`,netRevenue:0,skuCount:0};});items.forEach(it=>{total+=Number(it.amount||0);if(map[it.order_no]){map[it.order_no].netRevenue+=Number(it.amount||0);map[it.order_no].skuCount+=1;}});renderReportHtml(selectedReportDate,total,Object.values(map));}catch(e){document.getElementById('list').innerHTML=`<div style="color:red;padding:20px;">❌ 加载数据失败: ${e.message}</div>`;}}
function renderReportHtml(dateStr,netSum,rows){document.getElementById('list').innerHTML=`<div class="big-store-title">📈 卖进数据</div><div class='sub' style='font-weight:700;color:var(--primary);font-size:15px;margin-bottom:10px;'>业务员：${esc(currentEmployee.name)}</div><div style='margin-bottom:14px;font-size:14px;display:flex;align-items:center;gap:8px;'><span>🗓️ 日期：</span><div class="date-picker-wrapper"><button class='smallbtn' style="border-color:var(--primary);color:var(--primary);font-weight:bold;">${dateStr?dateStr+' 🔄':'全部历史 🗓️'}</button><input type="date" class="real-date-input" value="${dateStr||''}" onchange="openSaleReport(this.value)"></div>${dateStr?`<button class="smallbtn" style="color:#756676;" onclick="openSaleReport('')">清除</button>`:''}</div><div class="amount-summary-banner" style="line-height:1.6;background:#fbf8fc;"><span>💵 <strong>总实收：${netSum.toFixed(2)} 元</strong></span></div>${rows.length===0?`<div class="sub" style="text-align:center;padding:40px;color:#aaa;">⚠️ 暂无报表记录</div>`:rows.map(r=>`<div class="history-item" style="cursor:pointer;border-left:4px solid var(--primary);padding:14px;margin-bottom:10px;" onclick="triggerReportDetailView('${esc(r.atomCode)}','${esc(r.storeName)}','${esc(r.orderNo)}','${esc(r.orderDate)}')"><div style="width:100%;display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:15px;color:var(--primary);">${esc(r.storeName)}</strong><span style="color:var(--text-muted);font-size:12px;background:#f4f2f5;padding:2px 6px;border-radius:4px;">${r.orderDate}</span></div><div style="font-size:12px;color:var(--text-muted);margin-top:6px;display:flex;justify-content:space-between;width:100%;"><span>品项: <strong>${r.skuCount}</strong> 种</span><span style="color:#2b1d2c;font-weight:700;font-size:13px;">💵 实收：${r.netRevenue.toFixed(2)} 元</span></div></div>`).join('')}`;}
function triggerReportDetailView(atomCode,storeName,orderNo,orderDate){currentStore={atom:atomCode,name:storeName};viewOrderDetail(orderNo,orderDate,true);}
function editExistingOrder(orderNo,orderDate,rawItemsEncoded){isNewStoreFlow=false;templateEditOrNew(orderNo,orderDate,rawItemsEncoded);}
function openOrder(atom,name){isNewStoreFlow=String(atom).startsWith('NEW_');templateEditOrNew(null,null,null,atom,name);}
function templateEditOrNew(orderNo=null,orderDate=null,rawItemsEncoded=null,atom=null,name=null){STATE='ORDER';if(orderNo){const items=JSON.parse(decodeURIComponent(rawItemsEncoded));orderData={order_no:orderNo,atom:currentStore.atom,name:currentStore.name,date:orderDate,items:{},oldDbItemsMap:{}};products.forEach(p=>{orderData.items[p.id]={cases:0,boxes:0,pcs:0,price:p.default_price||15};});items.forEach(it=>{const pObj=products.find(x=>x.id==it.barcode)||{pcs_per_case:24,pcs_per_box:0};let tot=Number(it.qty||0),curC=Math.floor(tot/pObj.pcs_per_case),rem=tot%pObj.pcs_per_case,curB=pObj.pcs_per_box>0?Math.floor(rem/pObj.pcs_per_box):0,curP=pObj.pcs_per_box>0?rem%pObj.pcs_per_box:rem;orderData.items[it.barcode]={cases:curC,boxes:curB,pcs:curP,price:Number(it.unit_price||0)};orderData.oldDbItemsMap[it.barcode]=Number(it.qty||0);});}else{const d=new Date(),today=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;orderData={atom,name,date:today,items:{},oldDbItemsMap:{}};products.forEach(p=>{orderData.items[p.id]={cases:0,boxes:0,pcs:0,price:p.default_price||15};});}if(products.length){const brands=orderedUnique(products,'brand');currentSelectedBrand=brands[0]||null;const specs=getSpecsForBrand(currentSelectedBrand);currentSelectedSpec=specs[0]||'';}renderOrder();}
function calculateLiveOrderAmounts(){let s=0,count=0;products.forEach(p=>{const item=orderData.items[p.id];if(item){const normal=(Number(item.cases||0)*p.pcs_per_case)+(Number(item.boxes||0)*p.pcs_per_box)+Number(item.pcs||0);if(normal>0)count++;s+=normal*Number(item.price||0);}});document.getElementById('liveAmountBanner').innerHTML=`<span style="font-size:15px;color:var(--primary);">💵 <strong>实时预估实收：${s.toFixed(2)} 元</strong></span><br>选购品项：${count} 款`;}
function renderOrder(){STATE='ORDER';const displayProducts=orderedProducts(products.filter(p=>p.brand===currentSelectedBrand&&p.spec===currentSelectedSpec));const isTemp=String(orderData.atom).startsWith('NEW_');document.getElementById('list').innerHTML=`<div class="big-store-title">${esc(orderData.name)} ${isTemp?'<span style="font-size:12px;background:#fff1f0;color:#ff4d4f;padding:2px 8px;border-radius:12px;vertical-align:middle;">新门店开单</span>':''}</div><div style='margin-bottom:8px;'>📅 日期：<span id='dateText'>${orderData.date}</span><div class="date-picker-wrapper"><button class='smallbtn'>修改日期</button><input type="date" class="real-date-input" value="${orderData.date}" onchange="syncSelectedDate(this.value)"></div></div><div id="liveAmountBanner" class="amount-summary-banner"></div>${generateFilterHeaderHtml()}${displayProducts.map(p=>{const defaultPrice=p.default_price||15,specBox=p.pcs_per_box||0,it=orderData.items[p.id];return `<div class='item'><div class="item-main-row"><div class='prod-info'><div class='prod-name'>${esc(p.product_name)}</div></div><div class='control-group'><div class="picker-wrapper"><span class="label-txt">销售:</span><select class="ios-picker" onchange="pickerChangeCombinedQty('${esc(p.id)}','cases',this.value)">${makePureQtyOptionsHtml(50,it.cases)}</select><span class="unit-txt">件</span></div><div class="picker-wrapper ${specBox===0?'hide':''}"><select class="ios-picker" onchange="pickerChangeCombinedQty('${esc(p.id)}','boxes',this.value)">${makePureQtyOptionsHtml(50,it.boxes)}</select><span class="unit-txt">盒</span></div><div class="picker-wrapper"><select class="ios-picker" onchange="pickerChangeCombinedQty('${esc(p.id)}','pcs',this.value)">${makePureQtyOptionsHtml(100,it.pcs)}</select><span class="unit-txt">${unitOf(p)}</span></div><div class="picker-wrapper" style="margin-left:auto;"><span class="label-txt">单价:</span><select class="ios-picker" onchange="pickerChangePrice('${esc(p.id)}',this.value)">${makePurePriceOptionsHtml(defaultPrice,it.price)}</select><span class="unit-txt">元</span></div></div></div></div>`;}).join('')}<button class='float-submit' onclick='submitOrder()'>🚀 提交账单</button>`;calculateLiveOrderAmounts();}
function initItemState(id){if(!orderData.items[id]){const p=products.find(x=>x.id==id);orderData.items[id]={cases:0,boxes:0,pcs:0,price:p.default_price||15};}}
function pickerChangeCombinedQty(id,type,value){initItemState(id);orderData.items[id][type]=parseInt(value)||0;calculateLiveOrderAmounts();}
function pickerChangePrice(id,value){initItemState(id);const price=parseFloat(value)||0;const cur=products.find(x=>x.id==id);if(!cur)return;products.filter(p=>p.brand===cur.brand&&p.spec===cur.spec).forEach(p=>{initItemState(p.id);orderData.items[p.id].price=price;});renderOrder();}
function syncSelectedDate(val){if(!val)return;orderData.date=val;document.getElementById('dateText').innerText=val;}
async function submitOrder(){let grand=0;Object.keys(orderData.items).forEach(id=>{const it=orderData.items[id],p=products.find(x=>x.id==id)||{pcs_per_case:24,pcs_per_box:0};grand+=(Number(it.cases||0)*p.pcs_per_case)+(Number(it.boxes||0)*p.pcs_per_box)+Number(it.pcs||0);});if(grand===0){alert('⚠️ 空白单据无法提交！');return;}const btn=document.querySelector('.float-submit');if(btn){btn.disabled=true;btn.innerText='⏳ 正在保存...';}try{let finalOrderNo=orderData.order_no;if(isNewStoreFlow&&!finalOrderNo){await client.from('employee_store_assets').insert({employee_code:String(currentEmployee.code),atom_code:String(orderData.atom),store_name:String(orderData.name)});stores.push({atom_code:orderData.atom,store_name:orderData.name});stores.sort((a,b)=>a.store_name.localeCompare(b.store_name,'zh-CN'));isNewStoreFlow=false;}const{data:currentStocks}=await client.from('van_stocks').select('*').eq('employee_code',currentEmployee.code);const live={};(currentStocks||[]).forEach(st=>{live[st.product_barcode]=Number(st.qty)||0;});const stockUpdates=[],itemsPayload=[];let total=0;const allIds=new Set([...Object.keys(orderData.items),...Object.keys(orderData.oldDbItemsMap||{})]);for(const id of allIds){const p=products.find(x=>x.id==id);if(!p)continue;const item=orderData.items[id]||{cases:0,boxes:0,pcs:0,price:p.default_price||15};const oldDb=Number(orderData.oldDbItemsMap?.[id]||0);const normal=(Number(item.cases||0)*p.pcs_per_case)+(Number(item.boxes||0)*p.pcs_per_box)+Number(item.pcs||0);const delta=normal-oldDb;const finalStock=Number(live[id]||0)-delta;if(delta!==0||normal>0)stockUpdates.push({product_barcode:String(id),qty:Number(finalStock)});if(normal>0){const amount=normal*Number(item.price||0);total+=amount;itemsPayload.push({barcode:String(id),product_name:String(p.product_name),qty:Number(normal),unit_price:Number(item.price||0),amount:Number(amount.toFixed(2))});}}
if(!finalOrderNo)finalOrderNo='SO'+Date.now()+Math.floor(Math.random()*1000);const{error}=await client.rpc('submit_sales_order_v2',{p_order_no:String(finalOrderNo),p_employee_code:String(currentEmployee.code),p_atom_code:String(orderData.atom),p_store_name:String(orderData.name),p_total_amount:Number(total.toFixed(2)),p_items:itemsPayload,p_stock_updates:stockUpdates});if(error)throw new Error(error.message);alert('✅ 开单成功');orderData=null;openStoreHistory(currentStore.atom,currentStore.name);}catch(err){console.error(err);alert(`❌ 账单保存失败: ${err.message||'网络错误'}`);if(btn){btn.disabled=false;btn.innerText='🚀 提交账单';}}}
function goBack(){if(STATE==='STORE'){sessionStorage.clear();window.location.href='index.html';}else if(STATE==='STOCK'||STATE==='REPORT'||STATE==='NEW_STORE_MGT'){orderData=null;selectedReportDate='';renderStores();}else if(STATE==='DETAIL'){if(document.getElementById('list').getAttribute('data-from-report')==='true')openSaleReport(selectedReportDate);else renderHistory();}else if(STATE==='ORDER'){if(orderData?.order_no){const no=orderData.order_no,d=orderData.date,from=document.getElementById('list').getAttribute('data-from-report')==='true';orderData=null;viewOrderDetail(no,d,from);}else{const isTemp=String(orderData?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderHistory();}}else if(STATE==='HISTORY'){const isTemp=String(currentStore?.atom).startsWith('NEW_');orderData=null;if(isTemp)openNewStoreManagement();else renderStores();}}
init();
</script>
